      .dual-score-dashboard { grid-template-columns: 1fr; }
    }

    @media (max-width: 420px) {
      .preset-grid,
      .play-style-grid,
      .nearby-choice-grid { grid-template-columns: 1fr; }
      .importance-options { grid-template-columns: 1fr; }
    }

    .bottom-nav {
      position: fixed;
      right: max(10px, env(safe-area-inset-right));
      bottom: max(8px, env(safe-area-inset-bottom));
      left: max(10px, env(safe-area-inset-left));
      z-index: 150;
      display: none;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 4px;
      max-width: 520px;
      margin: 0 auto;
      padding: 7px;
      border: 1px solid rgba(226, 232, 240, 0.16);
      border-radius: 20px;
      background: rgba(8, 17, 31, 0.9);
      box-shadow: 0 20px 55px rgba(2, 6, 23, 0.48), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(22px) saturate(1.35);
      -webkit-backdrop-filter: blur(22px) saturate(1.35);
    }

    .bottom-nav button {
      display: grid;
      min-width: 0;
      min-height: 52px;
      padding: 6px 3px;
      border: 0;
      border-radius: 14px;
      place-items: center;
      gap: 2px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-size: 0.61rem;
      font-weight: 800;
    }

    .bottom-nav button > span:first-child {
      font-size: 1.05rem;
    }

    .bottom-nav button.active {
      color: var(--text);
      background: linear-gradient(145deg, rgba(251, 113, 133, 0.2), rgba(167, 139, 250, 0.11));
      box-shadow: inset 0 0 0 1px rgba(251, 113, 133, 0.24);
    }

    .resume-card {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 14px;
      margin: 18px 0 22px;
      padding: 17px;
      border: 1px solid rgba(96, 165, 250, 0.28);
      border-radius: 20px;
      align-items: center;
      background: linear-gradient(145deg, rgba(96, 165, 250, 0.12), rgba(30, 41, 59, 0.84));
      box-shadow: 0 18px 42px rgba(2, 6, 23, 0.24);
    }

    .resume-icon {
      display: grid;
      width: 48px;
      height: 48px;
      border-radius: 15px;
      place-items: center;
      color: #dbeafe;
      background: rgba(96, 165, 250, 0.18);
      font-size: 1.2rem;
    }

    .resume-copy strong,
    .resume-copy span {
      display: block;
    }

    .resume-copy span {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.72rem;
    }

    .intensity-picker,
    .theme-picker,
    .choice-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(125px, 1fr));
      gap: 9px;
    }

    .intensity-option,
    .theme-option,
    .choice-option {
      position: relative;
      cursor: pointer;
    }

    .intensity-option input,
    .theme-option input,
    .choice-option input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
    }

    .intensity-card,
    .theme-card,
    .choice-card {
      display: grid;
      min-height: 90px;
      padding: 13px;
      border: 1px solid rgba(226, 232, 240, 0.13);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.46);
      transition: 180ms ease;
    }

    .intensity-card strong,
    .theme-card strong,
    .choice-card strong {
      color: var(--text);
      font-size: 0.8rem;
    }

    .intensity-card small,
    .theme-card small,
    .choice-card small {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.65rem;
      line-height: 1.35;
    }

    .intensity-option input:checked + .intensity-card,
    .theme-option input:checked + .theme-card,
    .choice-option input:checked + .choice-card {
      border-color: var(--coral);
      background: linear-gradient(145deg, rgba(251, 113, 133, 0.16), rgba(167, 139, 250, 0.08));
      box-shadow: 0 0 0 3px rgba(251, 113, 133, 0.08);
      transform: translateY(-2px);
    }

    .topic-option:has(input:disabled) {
      cursor: not-allowed;
      opacity: 0.42;
    }

    .question-actions {
      flex-wrap: wrap;
    }

    .question-actions .primary-btn {
      margin-left: auto;
    }

    .question-card .category-pill {
      border-color: color-mix(in srgb, var(--question-color) 42%, transparent);
      color: color-mix(in srgb, var(--question-color) 72%, white);
      background: color-mix(in srgb, var(--question-color) 11%, transparent);
    }

    .question-card .category-symbol {
      background: color-mix(in srgb, var(--question-color) 22%, transparent);
    }

    .alignment-ring {
      animation: ring-arrive 720ms var(--ease-out) both;
    }

    @keyframes ring-arrive {
      from { opacity: 0; transform: scale(.72) rotate(-16deg); }
      to { opacity: 1; transform: scale(1) rotate(0); }
    }

    .settings-screen,
    .results-screen {
      margin: 0;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .settings-card,
    .journal-card,
    .trend-card,
    .pack-manager {
      padding: 14px;
      border: 1px solid rgba(226, 232, 240, 0.13);
      border-radius: 16px;
      background: linear-gradient(145deg, rgba(39, 52, 73, 0.88), rgba(24, 35, 53, 0.84));
      box-shadow: 0 18px 45px rgba(2, 6, 23, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .settings-card.full,
    .pack-manager {
      grid-column: 1 / -1;
    }

    .settings-card h3,
    .journal-card h3,
    .trend-card h3 {
      margin: 0 0 6px;
      font-size: 0.95rem;
    }

    .settings-card > p,
    .journal-card > p,
    .trend-card > p {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.5;
    }

    .setting-row {
      display: flex;
      min-height: 44px;
      padding: 6px 0;
      border-top: 1px solid rgba(148, 163, 184, 0.1);
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .setting-row:first-of-type { border-top: 0; }

    .setting-row label,
    .setting-row span {
      color: #e2e8f0;
      font-size: 0.76rem;
      font-weight: 760;
    }

    .setting-row select,
    .setting-row input[type="range"] {
      width: min(48%, 190px);
    }

    .journal-overview {
      display: grid;
      grid-template-columns: minmax(180px, 0.7fr) minmax(0, 1.3fr);
      gap: 16px;
      margin-top: 24px;
    }

    .trend-list,
    .round-history-list,
    .change-list {
      display: grid;
      gap: 10px;
    }

    .trend-row {
      display: grid;
      grid-template-columns: minmax(90px, 1fr) minmax(110px, 2fr) auto;
      gap: 10px;
      align-items: center;
      font-size: 0.72rem;
      font-weight: 760;
    }

    .trend-track {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #334155;
    }

    .trend-fill {
      width: var(--trend-score);
      height: 100%;
      border-radius: inherit;
      background: var(--trend-color);
    }

    .round-history-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 13px;
      padding: 14px;
      border: 1px solid rgba(148, 163, 184, 0.13);
      border-radius: 16px;
      align-items: center;
      background: rgba(15, 23, 42, 0.4);
    }

    .round-score {
      display: grid;
      width: 52px;
      height: 52px;
      border: 4px solid var(--round-color);
      border-radius: 50%;
      place-items: center;
      color: var(--round-color);
      font-size: 0.77rem;
      font-weight: 900;
    }

    .round-copy strong,
    .round-copy span {
      display: block;
    }

    .round-copy span {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.66rem;
    }

    .celebration-screen {
      text-align: center;
    }

    .celebration-card {
      position: relative;
      padding: clamp(34px, 8vw, 72px) 24px;
      overflow: hidden;
      border: 1px solid rgba(251, 191, 36, 0.26);
      border-radius: 30px;
      background:
        radial-gradient(circle at 50% 25%, rgba(251, 191, 36, 0.16), transparent 15rem),
        radial-gradient(circle at 8% 90%, rgba(251, 113, 133, 0.13), transparent 16rem),
        linear-gradient(145deg, rgba(39, 52, 73, 0.96), rgba(24, 35, 53, 0.94));
      box-shadow: var(--shadow);
    }

    .celebration-orb {
      display: grid;
      width: 110px;
      height: 110px;
      margin: 0 auto 24px;
      border: 1px solid rgba(251, 191, 36, 0.35);
      border-radius: 36px;
      place-items: center;
      color: var(--sun);
      background: linear-gradient(145deg, rgba(251, 191, 36, 0.18), rgba(251, 113, 133, 0.1));
      box-shadow: 0 20px 55px rgba(251, 191, 36, 0.16);
      font-size: 2.8rem;
      animation: heart-beat 2.2s ease-in-out infinite;
    }

    .discussion-card,
    .alignment-rating,
    .private-reflection {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid rgba(148, 163, 184, 0.13);
      border-radius: 15px;
      background: rgba(15, 23, 42, 0.44);
    }

    .discussion-card {
      border-color: rgba(167, 139, 250, 0.22);
      background: linear-gradient(145deg, rgba(167, 139, 250, 0.1), rgba(15, 23, 42, 0.44));
    }

    .discussion-card strong,
    .alignment-rating strong {
      display: block;
      color: #e2e8f0;
      font-size: 0.72rem;
    }

    .discussion-card p {
      margin: 7px 0 0;
      color: #ddd6fe;
      font-size: 0.78rem;
      line-height: 1.5;
    }

    .rating-options {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
    }

    .rating-option {
      min-height: 44px;
      padding: 5px;
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 10px;
      color: var(--muted);
      background: rgba(15, 23, 42, 0.52);
      cursor: pointer;
      font-size: 0.61rem;
      font-weight: 760;
    }

    .rating-option.active {
      border-color: var(--rating-color);
      color: var(--text);
      background: color-mix(in srgb, var(--rating-color) 15%, rgba(15, 23, 42, 0.62));
    }

    .private-note-input {
      width: 100%;
      min-height: 76px;
      margin-top: 9px;
      padding: 11px;
      resize: vertical;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 11px;
      outline: none;
      color: var(--text);
      background: rgba(8, 17, 31, 0.58);
    }

    .favorite-button {
      min-width: 44px;
      min-height: 44px;
      padding: 0;
      border: 1px solid rgba(251, 191, 36, 0.2);
      border-radius: 12px;
      color: #94a3b8;
      background: rgba(15, 23, 42, 0.48);
      cursor: pointer;
    }

    .favorite-button.active {
      color: var(--sun);
      background: rgba(251, 191, 36, 0.11);
    }

    .tutorial-steps {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .tutorial-step {
      padding: 13px;
      border: 1px solid rgba(148, 163, 184, 0.13);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.42);
      text-align: center;
    }

    .tutorial-step span {
      display: grid;
      width: 38px;
      height: 38px;
      margin: 0 auto 8px;
      border-radius: 12px;
      place-items: center;
      color: var(--coral);
      background: rgba(251, 113, 133, 0.1);
    }

    .tutorial-step strong,
    .tutorial-step small { display: block; }
    .tutorial-step small { margin-top: 5px; color: var(--muted); line-height: 1.35; }

    @media (max-width: 900px) {
      .bottom-nav { display: grid; }
      .app-shell { padding-bottom: max(96px, calc(env(safe-area-inset-bottom) + 86px)); }
    }

    @media (max-width: 600px) {
      .settings-grid,
      .journal-overview { grid-template-columns: 1fr; }
      .settings-card.full,
      .pack-manager { grid-column: auto; }
      .resume-card { grid-template-columns: auto minmax(0, 1fr); }
      .resume-card .primary-btn { grid-column: 1 / -1; width: 100%; }
      .rating-options { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .round-history-item { grid-template-columns: auto minmax(0, 1fr); }
      .round-history-item .round-actions { grid-column: 1 / -1; }
      .tutorial-steps { grid-template-columns: 1fr; }
      .question-actions { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .question-actions .primary-btn { grid-column: 1 / -1; width: 100%; margin-left: 0; }
    }

    /* Four genuinely different visual worlds */
    body,
    .topbar,
    .bottom-nav,
    .setup-card,
    .question-card,
    .card-face {
      transition: color 260ms ease, background-color 260ms ease, border-color 260ms ease, box-shadow 260ms ease;
    }

    .theme-card {
      grid-template-rows: 46px auto 1fr;
      min-height: 140px;
      overflow: hidden;
    }

    .theme-preview {
      position: relative;
      display: block;
      height: 38px;
      margin: -3px -3px 10px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 11px;
    }

    .theme-preview i {
      position: absolute;
      display: block;
    }

    .theme-preview-midnight {
      background: radial-gradient(circle at 18% 20%, #fb7185 0 3px, transparent 4px), linear-gradient(135deg, #08111f, #1e293b);
      box-shadow: inset 0 0 18px rgba(96, 165, 250, 0.18);
    }

    .theme-preview-midnight i:nth-child(1) { inset: 9px 10px 9px 42%; border: 1px solid rgba(255,255,255,.25); border-radius: 8px; background: rgba(255,255,255,.06); }
    .theme-preview-midnight i:nth-child(2) { left: 13px; bottom: 7px; width: 19px; height: 7px; border-radius: 99px; background: #fb7185; }
    .theme-preview-midnight i:nth-child(3) { top: 7px; right: 8px; width: 3px; height: 3px; border-radius: 50%; background: #fff; box-shadow: -16px 3px #a78bfa, -32px -1px #60a5fa; }

    .theme-preview-sunset {
      border-radius: 18px 5px 18px 5px;
      background: linear-gradient(165deg, #3b1023 0 46%, #a9453f 47% 72%, #f0a75d 73%);
    }

    .theme-preview-sunset i:nth-child(1) { right: 11px; bottom: 5px; width: 27px; height: 27px; border-radius: 50%; background: #ffd166; box-shadow: 0 0 18px rgba(255,209,102,.7); }
    .theme-preview-sunset i:nth-child(2) { left: 11px; top: 10px; width: 35%; height: 3px; border-radius: 3px; background: #fff1d6; box-shadow: 0 7px rgba(255,241,214,.55); }
    .theme-preview-sunset i:nth-child(3) { right: 38px; bottom: -9px; width: 43px; height: 22px; border-radius: 50% 50% 0 0; background: #71354a; }

    .theme-preview-cosmic {
      border-radius: 3px;
      background-color: #050113;
      background-image: linear-gradient(rgba(86,231,255,.16) 1px, transparent 1px), linear-gradient(90deg, rgba(86,231,255,.16) 1px, transparent 1px), radial-gradient(circle at 78% 25%, #ff54bd 0 2px, transparent 3px);
      background-size: 9px 9px, 9px 9px, auto;
      box-shadow: inset 0 0 16px rgba(167,119,255,.35);
    }

    .theme-preview-cosmic i:nth-child(1) { inset: 9px 14px 9px 38%; border: 1px solid #56e7ff; background: rgba(23,17,61,.88); box-shadow: 0 0 8px rgba(86,231,255,.7); clip-path: polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px); }
    .theme-preview-cosmic i:nth-child(2) { left: 10px; bottom: 8px; width: 24px; height: 4px; background: #ff54bd; box-shadow: 0 0 8px #ff54bd; }
    .theme-preview-cosmic i:nth-child(3) { top: 7px; left: 15px; width: 4px; height: 4px; background: #ffe66d; box-shadow: 13px 2px #56e7ff, 5px 8px #a777ff; transform: rotate(45deg); }

    .theme-preview-pastel {
      border-color: rgba(79,91,120,.14);
      border-radius: 15px;
      background: linear-gradient(135deg, #fff7f4, #f8f1ff 52%, #edf8ff);
      box-shadow: inset 0 0 0 4px rgba(255,255,255,.6);
    }

    .theme-preview-pastel i:nth-child(1) { top: 7px; left: 9px; width: 24px; height: 24px; border-radius: 9px 14px 12px 14px; background: #ffc4d0; transform: rotate(-9deg); }
    .theme-preview-pastel i:nth-child(2) { right: 9px; bottom: 6px; width: 42%; height: 19px; border-radius: 9px; background: #fff; box-shadow: 0 4px 10px rgba(85,74,112,.13); }
    .theme-preview-pastel i:nth-child(3) { top: 6px; right: 21px; width: 8px; height: 8px; border-radius: 50%; background: #8bdcc1; box-shadow: -15px 9px #a9cff5; }

    /* Midnight Glass — cinematic, rounded, translucent and starry */
    [data-theme="midnight"] body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    [data-theme="midnight"] .ambient-specks span {
      border-color: rgba(248, 250, 252, 0.2);
      border-radius: 35%;
      box-shadow: 0 0 12px rgba(96, 165, 250, 0.12);
    }

    /* Golden Hour — warm editorial typography and organic, sunlit surfaces */
    [data-theme="sunset"] body {
      font-family: "Trebuchet MS", "Avenir Next", Avenir, sans-serif;
      background:
        radial-gradient(ellipse at 50% 112%, rgba(255, 209, 102, 0.42), transparent 36rem),
        radial-gradient(circle at 92% 4%, rgba(255, 152, 100, 0.24), transparent 28rem),
        linear-gradient(158deg, #2a0d1d 0%, #6f2738 48%, #a74640 100%);
    }

    [data-theme="sunset"] body::before {
      opacity: 0.24;
      background-image: radial-gradient(circle, rgba(255, 237, 211, 0.22) 1px, transparent 1.5px);
      background-size: 26px 26px;
      mask-image: linear-gradient(to bottom, black, transparent 82%);
    }

    [data-theme="sunset"] body::after {
      top: auto;
      right: -90px;
      bottom: -110px;
      width: 330px;
      height: 330px;
      border: 0;
      background: radial-gradient(circle, rgba(255, 209, 102, 0.34), rgba(255, 138, 103, 0.08) 52%, transparent 70%);
      box-shadow: none;
    }

    [data-theme="sunset"] h1,
    [data-theme="sunset"] h2,
    [data-theme="sunset"] h3,
    [data-theme="sunset"] .prompt,
    [data-theme="sunset"] .card-question {
      font-family: Georgia, "Times New Roman", serif;
      letter-spacing: -0.035em;
    }

    [data-theme="sunset"] .eyebrow {
      color: var(--sun);
      letter-spacing: 0.18em;
    }

    [data-theme="sunset"] .accent-text {
      background-image: linear-gradient(105deg, #ffe6b7, #ffd166 42%, #ff9f78 90%);
      filter: drop-shadow(0 8px 16px rgba(255, 164, 92, 0.22));
    }

    [data-theme="sunset"] .aurora-blob {
      opacity: 0.17;
      filter: blur(34px);
      mix-blend-mode: soft-light;
    }

    [data-theme="sunset"] .ambient-specks span {
      border: 0;
      border-radius: 50% 10% 50% 10%;
      background: rgba(255, 220, 173, 0.3);
      transform: rotate(28deg);
    }

    [data-theme="sunset"] .topbar {
      border-radius: 28px 9px 28px 9px;
      background: linear-gradient(180deg, rgba(55, 16, 31, 0.94), rgba(94, 33, 47, 0.72));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    [data-theme="sunset"] .brand,
    [data-theme="sunset"] .home-btn {
      border-color: rgba(255, 226, 191, 0.22);
      border-radius: 18px 7px 18px 7px;
      background: linear-gradient(145deg, rgba(128, 52, 61, 0.92), rgba(65, 20, 36, 0.88));
      box-shadow: 0 14px 30px rgba(42, 13, 29, 0.22);
    }

    [data-theme="sunset"] .brand-mark {
      border-radius: 50% 50% 46% 54%;
      color: #562034;
      background: linear-gradient(145deg, #ffe09d, #ff9a76);
      box-shadow: 0 8px 24px rgba(255, 178, 94, 0.3);
    }

    [data-theme="sunset"] :is(.setup-card, .question-card, .lock-card, .alignment-dashboard, .home-results, .library-add, .settings-card, .journal-card, .trend-card, .pack-manager, .nearby-card, .celebration-card, .card-face, .library-question) {
      border-color: rgba(255, 226, 191, 0.2);
      border-radius: 34px 12px 34px 12px;
      background:
        radial-gradient(circle at 96% 0, rgba(255, 209, 102, 0.14), transparent 14rem),
        linear-gradient(145deg, rgba(120, 52, 67, 0.97), rgba(61, 20, 37, 0.96));
      box-shadow: 0 24px 54px rgba(42, 13, 29, 0.3), inset 0 1px 0 rgba(255, 244, 223, 0.1);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    [data-theme="sunset"] :is(.count-card, .mode-card, .topic-chip, .sound-setting, .library-launcher, .data-tool, .preset-card, .play-style-card, .importance-option, .highlight-card, .follow-through-button, .nearby-choice, .slider-panel, .comment-details, .comparison-wrap, .importance-panel, .follow-through, .round-history-item, .discussion-card, .alignment-rating, .private-reflection, .tutorial-step, .resume-card) {
      border-color: rgba(255, 226, 191, 0.19);
      border-radius: 22px 8px 22px 8px;
      background: rgba(67, 21, 38, 0.48);
      box-shadow: inset 0 1px 0 rgba(255, 243, 222, 0.06);
    }

    [data-theme="sunset"] :is(.name-input, .answer-textarea, .comment-textarea, .custom-input, .custom-select, .library-search, .pairing-code, .private-note-input) {
      border-color: rgba(255, 226, 191, 0.24);
      border-radius: 18px 6px 18px 6px;

    function sanitizeCompletedRounds(rounds, validIds) {
      if (!Array.isArray(rounds)) return [];
      return rounds
        .filter((round) => round && typeof round === "object")
        .map((round, roundIndex) => {
          const questionIds = Array.isArray(round.questionIds)
            ? [...new Set(round.questionIds.filter((id) => validIds.has(id)))]
            : [];
          const answers = Array.isArray(round.answers)
            ? [round.answers[0] || {}, round.answers[1] || {}]
            : [{}, {}];
          const comments = Array.isArray(round.comments)
            ? [round.comments[0] || {}, round.comments[1] || {}]
            : [{}, {}];
          const topics = Array.isArray(round.alignment?.topics)
            ? round.alignment.topics
                .filter((item) => item && typeof item === "object")
                .map((item) => ({
                  topic: String(item.topic || ""),
                  score: Math.max(0, Math.min(100, Math.round(Number(item.score) || 0))),
                  fitScore: Math.max(0, Math.min(100, Math.round(Number(item.fitScore ?? item.score) || 0))),
                  count: Math.max(0, Math.round(Number(item.count) || 0))
                }))
            : [];
          return {
            id: String(round.id || `round_restored_${roundIndex}`),
            completedAt: String(round.completedAt || new Date(0).toISOString()),
            names: Array.isArray(round.names)
              ? [String(round.names[0] || "Player 1"), String(round.names[1] || "Player 2")]
              : ["Player 1", "Player 2"],
            questionIds,
            answers,
            comments,
            privateNotes: Array.isArray(round.privateNotes)

              : [{}, {}],
            importance: Array.isArray(round.importance)

              : [{}, {}],
            notReady: Array.isArray(round.notReady)
              ? [round.notReady[0] || {}, round.notReady[1] || {}]
              : [{}, {}],
            textRatings: round.textRatings && typeof round.textRatings === "object" ? round.textRatings : {},
            conversationStatus: round.conversationStatus && typeof round.conversationStatus === "object" ? round.conversationStatus : {},
            sharedIntentions: Array.isArray(round.sharedIntentions) ? round.sharedIntentions : [],
            intensity: String(round.intensity || "curious"),
            alignment: {
              overall: Math.max(0, Math.min(100, Math.round(Number(round.alignment?.overall) || 0))),

        return legacy;

      return null;

            privatePinHash: restored.privatePinHash,
            tutorialSeen: restored.tutorialSeen,
            answeredQuestionIds: restored.answeredQuestionIds,
            excludedQuestionIds: restored.excludedQuestionIds,
            neverQuestionIds: restored.neverQuestionIds,
            favoriteQuestionIds: restored.favoriteQuestionIds,
            questionEdits: restored.questionEdits,
            questionFlags: restored.questionFlags,
            questionTagOverrides: restored.questionTagOverrides,
            customQuestions: restored.customQuestions,
            customPacks: restored.customPacks,
            completedRounds: restored.completedRounds,
            conversationStatus: restored.conversationStatus,

          };
        }

        restored.activePlayer = restored.activePlayer === 1 ? 1 : 0;
        if (isRoundScreen && idsAreValid) {
          restored.questionCount = restored.selectedQuestionIds.length;
        }
        restored.questionIndex = Math.max(
          0,
          Math.min(Math.max(0, restored.selectedQuestionIds.length - 1), Number(restored.questionIndex) || 0)
        );

      } catch {

    }

    let state = loadState();
    let lastRenderedScreen = null;
    let libraryView = { filter: "all", topic: "all", search: "", limit: 40 };
    let cleanupResponsiveRender = () => {};
    let deferredInstallPrompt = null;
    let nearbyPeerConnection = null;
    let nearbyDataChannel = null;
    let nearbySignalingSocket = null;
    let nearbyHeartbeatTimer = 0;
    let nearbyReconnectTimer = 0;
    let nearbyAutoStartTimer = 0;
    let nearbyIceServers = [];
    let nearbyPendingCandidates = [];
    let nearbyRuntime = { role: null, status: "idle", roomId: "", hostToken: "", joinToken: "", joinURL: "", remotePayload: null, localComplete: false, reconnectAttempts: 0, negotiating: false, roundStarted: false };
    // Keep this deployed infrastructure URL stable so existing TURN secrets and installed clients continue to work.
    const SIGNALING_SERVICE_URL = new URLSearchParams(location.search).get("signal") || "https://are-we-compatible-signal.bdaytin.workers.dev";

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
    });

    async function installApp() {
      const status = document.getElementById("install-status");
      if (!deferredInstallPrompt) {
        if (status) status.textContent = "Use your browser menu and choose Add to Home Screen or Install App.";
        return;
      }
      deferredInstallPrompt.prompt();
      const choice = await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      if (status) status.textContent = choice.outcome === "accepted" ? "Installation started." : "You can install later from this screen.";
    }

    function pairingJoinURL(roomId, joinToken) {
      return `${location.href.split("#")[0]}#join=${encodeURIComponent(`${roomId}.${joinToken}`)}`;
    }

    function renderPairingQR(value, accessibleLabel) {
      try {
        if (typeof qrcode !== "function") throw new Error("QR generator unavailable");
        const code = qrcode(0, "L");
        code.addData(value);
        code.make();
        return `<div class="qr-code-shell">${code.createSvgTag({ cellSize: 4, margin: 12, scalable: true, title: accessibleLabel, alt: accessibleLabel })}</div>`;
      } catch {
        return '<div class="qr-unavailable">This connection code is too large for a reliable QR image. Use Share or Copy code below instead.</div>';
      }
    }

    async function signalingRequest(path, options = {}) {
      let endpoint;
      try { endpoint = new URL(SIGNALING_SERVICE_URL); } catch { throw new Error("The one-scan connection service is not configured yet."); }
      const secureEndpoint = endpoint.protocol === "https:" || (location.protocol === "http:" && endpoint.hostname === location.hostname);
      if (!secureEndpoint) throw new Error("The one-scan connection service is not configured securely.");
      const response = await fetch(`${SIGNALING_SERVICE_URL}${path}`, {
        ...options,
        headers: { "content-type": "application/json", ...(options.headers || {}) }
      });
      let payload = {};
      try { payload = await response.json(); } catch {}
      if (!response.ok) throw new Error(payload.error || "The private connection service is unavailable.");
      return payload;
    }

    function sendNearbySignal(payload) {
      if (nearbySignalingSocket?.readyState !== WebSocket.OPEN) return false;
      nearbySignalingSocket.send(JSON.stringify(payload));
      return true;
    }

    async function addNearbyCandidate(candidate) {
      if (!candidate) return;
      if (!nearbyPeerConnection?.remoteDescription) {
        nearbyPendingCandidates.push(candidate);
        return;
      }
      try { await nearbyPeerConnection.addIceCandidate(candidate); } catch {}
    }

    async function flushNearbyCandidates() {
      const candidates = nearbyPendingCandidates.splice(0);
      for (const candidate of candidates) {
        try { await nearbyPeerConnection?.addIceCandidate(candidate); } catch {}
      }
    }

    async function negotiateNearbyHost({ iceRestart = false } = {}) {
      if (nearbyRuntime.role !== "host" || nearbyRuntime.negotiating) return;
      nearbyRuntime.negotiating = true;
      try {
        if (!nearbyPeerConnection || nearbyPeerConnection.connectionState === "closed") {
          const peer = createNearbyPeer();
          attachNearbyChannel(peer.createDataChannel("how-well-align-local", { ordered: true }));
        }
        nearbyRuntime.status = "connecting";
        if (state.screen === "nearby") render();
        const offer = await nearbyPeerConnection.createOffer({ iceRestart });
        await nearbyPeerConnection.setLocalDescription(offer);
        sendNearbySignal({ type: "offer", description: nearbyPeerConnection.localDescription });
      } catch {
        nearbyRuntime.status = "failed";
        if (state.screen === "nearby") render();
      } finally {
        nearbyRuntime.negotiating = false;
      }
    }

    async function acceptNearbyOffer(description) {
      if (nearbyRuntime.role !== "join") return;
      try {
        if (!nearbyPeerConnection || nearbyPeerConnection.connectionState === "closed") {
          const peer = createNearbyPeer();
          peer.addEventListener("datachannel", (event) => attachNearbyChannel(event.channel));
        }
        nearbyRuntime.status = "connecting";
        if (state.screen === "nearby") render();
        await nearbyPeerConnection.setRemoteDescription(description);
        await flushNearbyCandidates();
        await nearbyPeerConnection.setLocalDescription(await nearbyPeerConnection.createAnswer());
        sendNearbySignal({ type: "answer", description: nearbyPeerConnection.localDescription });
      } catch {
        nearbyRuntime.status = "failed";
        if (state.screen === "nearby") render();
      }
    }

    async function handleNearbySignal(payload) {
      if (payload.type === "socket-ready") {
        nearbyRuntime.reconnectAttempts = 0;
        nearbyRuntime.status = nearbyDataChannel?.readyState === "open" ? "connected" : nearbyRuntime.role === "host" ? "room-ready" : "waiting-host";
        if (state.screen === "nearby") render();
      } else if (payload.type === "peer-ready") {
        if (nearbyDataChannel?.readyState === "open") return;
        if (nearbyRuntime.role === "host") await negotiateNearbyHost();
        else {
          nearbyRuntime.status = "waiting-host";
          if (state.screen === "nearby") render();
        }
      } else if (payload.type === "peer-waiting" && nearbyRuntime.status !== "connected") {
        nearbyRuntime.status = nearbyRuntime.role === "host" ? "room-ready" : "waiting-host";
        if (state.screen === "nearby") render();
      } else if (payload.type === "offer") {
        await acceptNearbyOffer(payload.description);
      } else if (payload.type === "answer" && nearbyRuntime.role === "host") {
        await nearbyPeerConnection?.setRemoteDescription(payload.description);
        await flushNearbyCandidates();
      } else if (payload.type === "candidate") {
        await addNearbyCandidate(payload.candidate);
      }
    }

    function connectNearbySignaling(role, roomId, token) {
      return new Promise((resolve, reject) => {
        const socketURL = new URL(`${SIGNALING_SERVICE_URL}/api/rooms/${encodeURIComponent(roomId)}/socket`);
        socketURL.protocol = socketURL.protocol === "https:" ? "wss:" : "ws:";
        socketURL.searchParams.set("role", role);
        socketURL.searchParams.set("token", token);
        const socket = new WebSocket(socketURL);
        nearbySignalingSocket = socket;
        const openTimeout = window.setTimeout(() => {
          socket.__manualClose = true;
          socket.close();
          reject(new Error("The private connection service took too long to respond."));
        }, 12000);
        socket.addEventListener("open", () => {
          clearTimeout(openTimeout);
          clearInterval(nearbyHeartbeatTimer);
          nearbyHeartbeatTimer = window.setInterval(() => sendNearbySignal({ type: "ping" }), 20000);
          resolve();
        }, { once: true });
        socket.addEventListener("message", (event) => {
          let payload;
          try { payload = JSON.parse(event.data); } catch { return; }
          handleNearbySignal(payload);
        });
        socket.addEventListener("error", () => {
          if (socket.readyState !== WebSocket.OPEN) reject(new Error("The private connection service could not be reached."));
        }, { once: true });
        socket.addEventListener("close", () => {
          clearInterval(nearbyHeartbeatTimer);
          if (socket.__manualClose || socket !== nearbySignalingSocket) return;
          const connectionWasReady = nearbyDataChannel?.readyState === "open";
          if (!connectionWasReady) {
            nearbyRuntime.status = "reconnecting";
            if (state.screen === "nearby") render();
          }
          const attempt = Math.min(nearbyRuntime.reconnectAttempts + 1, 6);
          nearbyRuntime.reconnectAttempts = attempt;
          clearTimeout(nearbyReconnectTimer);
          nearbyReconnectTimer = window.setTimeout(() => connectNearbySignaling(role, roomId, token).catch(() => {}), Math.min(8000, 600 * 2 ** attempt));
        });
      });
    }

    function closeNearbyConnection() {
      clearInterval(nearbyHeartbeatTimer);
      clearTimeout(nearbyReconnectTimer);
      clearTimeout(nearbyAutoStartTimer);
      if (nearbySignalingSocket) {
        nearbySignalingSocket.__manualClose = true;
        nearbySignalingSocket.close();
      }
      if (nearbyDataChannel) {
        nearbyDataChannel.__manualClose = true;
        nearbyDataChannel.close();
      }
      nearbyPeerConnection?.close();
      nearbySignalingSocket = null;
      nearbyDataChannel = null;
      nearbyPeerConnection = null;
      nearbyIceServers = [];
      nearbyPendingCandidates = [];
      nearbyRuntime = { role: null, status: "idle", roomId: "", hostToken: "", joinToken: "", joinURL: "", remotePayload: null, localComplete: false, reconnectAttempts: 0, negotiating: false, roundStarted: false };
    }

    function sendNearbyMessage(payload) {
      if (nearbyDataChannel?.readyState !== "open") return false;
      nearbyDataChannel.send(JSON.stringify(payload));
      return true;
    }

    function nearbyPlayerPayload() {
      const player = state.activePlayer;
      return {
        type: "player-complete",
        player,
        answers: { ...state.answers[player] },

    function finishNearbyRoundIfReady() {
      if (!nearbyRuntime.localComplete || !nearbyRuntime.remotePayload) return;
      const remote = nearbyRuntime.remotePayload;
      state.answers[remote.player] = remote.answers || {};
      state.comments[remote.player] = remote.comments || {};
      state.privateNotes[remote.player] = {};
      state.importance[remote.player] = remote.importance || {};
      state.notReady[remote.player] = remote.notReady || {};
      state.completedRounds = [...state.completedRounds, createCompletedRoundSnapshot()];
      state.answeredQuestionIds = [...new Set([...state.answeredQuestionIds, ...state.selectedQuestionIds])];
      state.screen = "celebration";
      state.revealedIds = [];
      saveState();
      playSound("celebrate");
      render();
    }

    function handleNearbyMessage(message) {
      let payload;
      try { payload = JSON.parse(message.data); } catch { return; }
      if (payload.type === "round-init") {
        const validTopics = new Set(TOPIC_OPTIONS.map((topic) => topic.id));
        (payload.questions || []).forEach((remoteQuestion) => {
          if (!remoteQuestion || typeof remoteQuestion !== "object" || typeof remoteQuestion.id !== "string") return;
          const builtIn = ALL_QUESTIONS.some((question) => question.id === remoteQuestion.id);
          if (builtIn) {
            state.questionEdits[remoteQuestion.id] = {
              prompt: String(remoteQuestion.prompt || "").slice(0, 500),
              ...(Array.isArray(remoteQuestion.labels) ? { labels: [String(remoteQuestion.labels[0] || "Low").slice(0, 60), String(remoteQuestion.labels[1] || "High").slice(0, 60)] } : {})
            };
          } else {
            const customId = remoteQuestion.id;
            if (!customId.startsWith("custom_")) return;
            const customExists = state.customQuestions.find((question) => question.id === customId);
            if (!customExists && state.customQuestions.length < 150) {
              const topic = validTopics.has(remoteQuestion.topic) ? remoteQuestion.topic : "connection";
              const type = remoteQuestion.type === "slider" ? "slider" : "text";
              const topicLabel = TOPIC_OPTIONS.find((option) => option.id === topic)?.label || "Connection";
              state.customQuestions.push({
                id: customId,
                topic,
                category: `Custom · ${topicLabel}`,
                type,
                prompt: String(remoteQuestion.prompt || "").slice(0, 500),
                ...(type === "slider"
                  ? { labels: [String(remoteQuestion.labels?.[0] || "Low").slice(0, 60), String(remoteQuestion.labels?.[1] || "High").slice(0, 60)] }
                  : {})
              });
            }
          }
        });
        const settings = persistentSetupState();
        state = {
          ...initialState(), ...settings,
          screen: "question", playStyle: "nearby", names: payload.names,
          questionMode: payload.questionMode, questionCount: payload.selectedQuestionIds.length,
          questionIntensity: payload.questionIntensity, selectedTopics: payload.selectedTopics,
          selectedQuestionIds: payload.selectedQuestionIds, activePlayer: 1
        };
        nearbyRuntime.role = "join";
        nearbyRuntime.localComplete = false;
        nearbyRuntime.remotePayload = null;
        saveState(); render(); playSound("unlock");
      } else if (payload.type === "player-complete") {
        nearbyRuntime.remotePayload = payload;
        finishNearbyRoundIfReady();
      } else if (payload.type === "follow-through") {
        if (state.selectedQuestionIds.includes(payload.questionId) && ["talk", "ground", "revisit", "intention"].includes(payload.status)) {
          state.conversationStatus[payload.questionId] = payload.status;
          saveState();
          if (state.screen === "reveal") render();
        }
      } else if (payload.type === "intention-update") {
        if (state.selectedQuestionIds.includes(payload.questionId)) {
          const text = String(payload.text || "").slice(0, 180);
          const existing = state.sharedIntentions.find((item) => item.questionId === payload.questionId);
          if (existing) existing.text = text;
          else state.sharedIntentions.push({ id: `intention_${Date.now()}_${randomIndex(10000)}`, questionId: payload.questionId, text, createdAt: new Date().toISOString(), completed: false });
          saveState();
        }
      } else if (payload.type === "reveal-state" && state.screen === "reveal") {
        state.revealedIds = Array.isArray(payload.revealedIds) ? payload.revealedIds.filter((id) => state.selectedQuestionIds.includes(id)) : [];
        saveState(); render();
      } else if (payload.type === "text-rating") {
        if (state.selectedQuestionIds.includes(payload.questionId) && ["aligned", "nuanced", "discuss", "different"].includes(payload.rating)) {
          state.textRatings[payload.questionId] = payload.rating;
          syncLatestRoundSnapshot(); saveState();
          if (state.screen === "reveal") render();
        }
      }
    }

    function attachNearbyChannel(channel) {
      nearbyDataChannel = channel;
      channel.addEventListener("open", () => {
        nearbyRuntime.status = "connected";
        if (state.screen === "nearby") render();
        playSound("match");
        if (nearbyRuntime.role === "host" && state.screen === "nearby") {
          clearTimeout(nearbyAutoStartTimer);
          nearbyAutoStartTimer = window.setTimeout(startNearbyRound, 650);
        }
      });
      channel.addEventListener("message", handleNearbyMessage);
      channel.addEventListener("close", () => {
        if (channel.__manualClose) return;
        nearbyRuntime.status = "disconnected";
        showToast("The nearby connection closed. Saved answers remain on this phone.");
        if (nearbyRuntime.role === "host" && nearbySignalingSocket?.readyState === WebSocket.OPEN) {
          window.setTimeout(() => {
            if (nearbyDataChannel === channel && channel.readyState === "closed") {
              nearbyPeerConnection?.close();
              nearbyPeerConnection = null;
              nearbyDataChannel = null;
              negotiateNearbyHost();
            }
          }, 800);
        }
      });
    }

    function createNearbyPeer() {
      if (!window.RTCPeerConnection) throw new Error("This browser does not support nearby browser-to-browser play.");
      if (nearbyDataChannel) {
        nearbyDataChannel.__manualClose = true;
        nearbyDataChannel.close();
        nearbyDataChannel = null;
      }
      nearbyPeerConnection?.close();
      nearbyPendingCandidates = [];
      const peer = new RTCPeerConnection({ iceServers: nearbyIceServers.length ? nearbyIceServers : [{ urls: "stun:stun.cloudflare.com:3478" }] });
      nearbyPeerConnection = peer;
      peer.addEventListener("icecandidate", (event) => {
        if (event.candidate) sendNearbySignal({ type: "candidate", candidate: event.candidate.toJSON?.() || event.candidate });
      });
      peer.addEventListener("connectionstatechange", () => {
        if (["failed", "disconnected"].includes(peer.connectionState)) {
          nearbyRuntime.status = peer.connectionState;
          if (state.screen === "nearby") render();
          if (peer.connectionState === "failed" && nearbyRuntime.role === "host" && nearbySignalingSocket?.readyState === WebSocket.OPEN) {
            window.setTimeout(() => negotiateNearbyHost({ iceRestart: true }), 500);
          }
        }
      });
      return peer;
    }

    async function prepareNearbyHost() {
      try {
        closeNearbyConnection();
        nearbyRuntime.role = "host";
        nearbyRuntime.status = "creating-room";
        render();
        const room = await signalingRequest("/api/rooms", { method: "POST", body: "{}" });
        nearbyIceServers = Array.isArray(room.iceServers) ? room.iceServers : [];
        nearbyRuntime = {
          ...nearbyRuntime,
          role: "host",
          status: "connecting-service",
          roomId: room.roomId,
          hostToken: room.hostToken,
          joinToken: room.joinToken,
          joinURL: pairingJoinURL(room.roomId, room.joinToken)
        };
        render();
        await connectNearbySignaling("host", room.roomId, room.hostToken);
      } catch (error) {
        nearbyRuntime.status = "failed";
        render(); showToast(error.message || "Nearby pairing could not start.");
      }
    }

    async function prepareNearbyJoin(roomId, joinToken) {
      try {
        closeNearbyConnection();
        nearbyRuntime = { ...nearbyRuntime, role: "join", status: "joining", roomId, joinToken };
        render();
        const room = await signalingRequest(`/api/rooms/${encodeURIComponent(roomId)}/join`, {
          method: "POST",
          body: JSON.stringify({ token: joinToken })
        });
        nearbyIceServers = Array.isArray(room.iceServers) ? room.iceServers : [];
        await connectNearbySignaling("join", roomId, joinToken);
      } catch (error) {
        nearbyRuntime.status = "failed";
        render(); showToast(error.message || "That pairing link is no longer valid.");
      }
    }

    function getQuestionCatalog() {

        const overrideTags = Array.isArray(state.questionTagOverrides?.[question.id]) ? state.questionTagOverrides[question.id] : [];
        return {
          ...question,
          ...edit,
          labels: question.type === "slider" ? (edit.labels || question.labels) : undefined,
          tags: [...new Set([question.topic, ...automaticTags, ...overrideTags])]
        };
      });
    }

          customPacks: payload.library?.customPacks || [],
          completedRounds: payload.history?.completedRounds || payload.library?.completedRounds || []
        };
      }
      if ([1, 2].includes(Number(payload?.version))) return { ...payload, version: 2 };
      throw new Error("This does not look like an Aligned backup file or a supported legacy backup.");
    }

    function exportBackup() {
      const blob = new Blob([JSON.stringify(createBackupPayload(), null, 2)], { type: "application/json" });

    function bytesToBase64(bytes) {
      let binary = "";
      for (let index = 0; index < bytes.length; index += 32768) {
        binary += String.fromCharCode(...bytes.subarray(index, index + 32768));
      }
      return btoa(binary);
    }

    function base64ToBytes(value) {
      const binary = atob(value);
      return Uint8Array.from(binary, (character) => character.charCodeAt(0));
    }

    function requestSecret({ title, copy, confirmLabel = "Continue", minimum = 1 }) {
      return new Promise((resolve) => {
        const overlay = document.createElement("div");
        overlay.className = "modal-backdrop";
        overlay.innerHTML = `
          <section class="exit-dialog" role="dialog" aria-modal="true" aria-labelledby="secret-title">
            <p class="eyebrow">Private & local</p>
            <h2 id="secret-title">${escapeHTML(title)}</h2>
            <p class="dialog-copy">${escapeHTML(copy)}</p>
            <label class="custom-label">Passphrase or PIN<input class="custom-input" id="secret-input" type="password" autocomplete="current-password"></label>
            <p class="error" id="secret-error" role="alert"></p>
            <div class="dialog-actions"><button class="secondary-btn" id="secret-cancel" type="button">Cancel</button><button class="primary-btn" id="secret-confirm" type="button">${escapeHTML(confirmLabel)}</button></div>
          </section>`;
        const finish = (value) => { overlay.remove(); resolve(value); };
        overlay.querySelector("#secret-cancel").addEventListener("click", () => finish(null));
        overlay.querySelector("#secret-confirm").addEventListener("click", () => {
          const value = overlay.querySelector("#secret-input").value;
          if (value.length < minimum) {
            overlay.querySelector("#secret-error").textContent = `Use at least ${minimum} characters.`;
            return;

          finish(value);
        });
        overlay.querySelector("#secret-input").addEventListener("keydown", (event) => {
          if (event.key === "Enter") overlay.querySelector("#secret-confirm").click();
        });
        document.body.appendChild(overlay);
        overlay.querySelector("#secret-input").focus();
      });
    }

    async function deriveBackupKey(passphrase, salt) {
      const material = await crypto.subtle.importKey("raw", new TextEncoder().encode(passphrase), "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", hash: "SHA-256", salt, iterations: 250000 },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt", "decrypt"]
      );
    }

    async function exportEncryptedBackup() {
      if (!window.crypto?.subtle) { showToast("Encrypted backups require a secure browser connection."); return; }
      const passphrase = await requestSecret({ title: "Encrypt this backup", copy: "Choose a passphrase you can remember. It cannot be recovered by the app.", confirmLabel: "Export encrypted", minimum: 8 });
      if (!passphrase) return;
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveBackupKey(passphrase, salt);
      const plaintext = new TextEncoder().encode(JSON.stringify(createBackupPayload()));
      const encrypted = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, plaintext));
      const wrapper = { app: "Aligned", formatVersion: 2, encrypted: true, cipher: "AES-GCM", kdf: "PBKDF2-SHA256", iterations: 250000, salt: bytesToBase64(salt), iv: bytesToBase64(iv), data: bytesToBase64(encrypted) };
      const blob = new Blob([JSON.stringify(wrapper)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = `aligned-private-${new Date().toISOString().slice(0, 10)}.aligned`;
      document.body.appendChild(anchor); anchor.click(); anchor.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 1000);
      playSound("lock");
      showToast("Encrypted backup created. Keep its passphrase somewhere safe.");
    }

    async function decryptBackupWrapper(wrapper) {
      if (!window.crypto?.subtle) throw new Error("This browser cannot decrypt the backup without a secure connection.");
      const passphrase = await requestSecret({ title: "Unlock encrypted backup", copy: "Enter the passphrase used when this backup was created.", confirmLabel: "Unlock", minimum: 1 });
      if (!passphrase) throw new Error("Import cancelled.");
      try {
        const key = await deriveBackupKey(passphrase, base64ToBytes(wrapper.salt));
        const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: base64ToBytes(wrapper.iv) }, key, base64ToBytes(wrapper.data));
        return JSON.parse(new TextDecoder().decode(decrypted));
      } catch {
        throw new Error("That passphrase is incorrect or the encrypted backup is damaged.");
      }
    }

    async function hashPin(pin) {
      if (!window.crypto?.subtle) {
        let hash = 2166136261;
        // Retain the legacy namespace so existing device PIN hashes remain valid after the rebrand.
        for (const character of `awc-private-notes:${pin}`) {
          hash ^= character.charCodeAt(0);
          hash = Math.imul(hash, 16777619);
        }
        return `local-${(hash >>> 0).toString(36)}`;
      }
      const digest = new Uint8Array(await crypto.subtle.digest("SHA-256", new TextEncoder().encode(`awc-private-notes:${pin}`)));
      return bytesToBase64(digest);
    }

    async function configurePrivatePin() {

        state.privatePinHash = "";
        saveState(); renderSettings(); showToast("Private-notes PIN removed.");
        return;
      }
      const pin = await requestSecret({ title: "Protect private reflections", copy: "Set a device-only PIN. This locks the private-note viewer, not the shared reveal board.", confirmLabel: "Set PIN", minimum: 4 });
      if (!pin) return;
      state.privatePinHash = await hashPin(pin);

    }

    let ambientSoundscape = null;

    class ProceduralAmbient {
      constructor() {
        this.ctx = null;
        this.oscillators = [];
        this.gainNodes = [];
        this.filter = null;
        this.isPlaying = false;
        this.lfo = null;
        this.lfoGain = null;
        this.masterGain = null;
      }

      init() {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        this.ctx = new AudioContextClass();
      }

      start() {
        if (this.isPlaying) return;
        if (!this.ctx) this.init();
        if (!this.ctx) return;

        if (this.ctx.state === "suspended") {
          this.ctx.resume();
        }

        this.isPlaying = true;
        const freqs = [87.31, 130.81, 164.81, 196.00, 220.00, 261.63];
        
        this.filter = this.ctx.createBiquadFilter();
        this.filter.type = "lowpass";
        this.filter.frequency.setValueAtTime(450, this.ctx.currentTime);
        this.filter.Q.setValueAtTime(1.5, this.ctx.currentTime);
        
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.setValueAtTime(0.0001, this.ctx.currentTime);
        this.masterGain.gain.linearRampToValueAtTime(state.soundVolume * 0.15, this.ctx.currentTime + 3.0);

        this.filter.connect(this.masterGain);
        this.masterGain.connect(this.ctx.destination);

        this.lfo = this.ctx.createOscillator();
        this.lfo.type = "sine";
        this.lfo.frequency.setValueAtTime(0.08, this.ctx.currentTime);
        
        this.lfoGain = this.ctx.createGain();
        this.lfoGain.gain.setValueAtTime(150, this.ctx.currentTime);
        
        this.lfo.connect(this.lfoGain);
        this.lfoGain.connect(this.filter.frequency);
        this.lfo.start();

        freqs.forEach((freq, index) => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          
          osc.type = "triangle";
          osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
          osc.detune.setValueAtTime((index % 2 === 0 ? 4 : -4) + (Math.random() - 0.5) * 2, this.ctx.currentTime);
          gain.gain.setValueAtTime(0.02, this.ctx.currentTime);
          
          const voiceLfo = this.ctx.createOscillator();
          voiceLfo.type = "sine";
          voiceLfo.frequency.setValueAtTime(0.05 + index * 0.015, this.ctx.currentTime);
          
          const voiceLfoGain = this.ctx.createGain();
          voiceLfoGain.gain.setValueAtTime(0.015, this.ctx.currentTime);
          
          voiceLfo.connect(voiceLfoGain);
          voiceLfoGain.connect(gain.gain);
          
          voiceLfo.start();
          
          osc.connect(gain);
          gain.connect(this.filter);
          
          osc.start();
          
          this.oscillators.push(osc);
          this.oscillators.push(voiceLfo);
          this.gainNodes.push(gain);
          this.gainNodes.push(voiceLfoGain);
        });
      }

      stop() {
        if (!this.isPlaying) return;
        this.isPlaying = false;
        const now = this.ctx.currentTime;
        if (this.masterGain) {
          this.masterGain.gain.setValueAtTime(this.masterGain.gain.value, now);
          this.masterGain.gain.exponentialRampToValueAtTime(0.0001, now + 1.5);
        }
        
        const oscs = this.oscillators;
        this.oscillators = [];
        this.gainNodes = [];
        this.filter = null;
        
        setTimeout(() => {
          if (this.isPlaying) return;
          oscs.forEach(osc => { try { osc.stop(); } catch {} });
        }, 1600);
      }

      updateVolume() {
        if (this.masterGain && this.ctx) {
          const now = this.ctx.currentTime;
          this.masterGain.gain.setValueAtTime(this.masterGain.gain.value, now);
          this.masterGain.gain.linearRampToValueAtTime(state.soundVolume * 0.15, now + 0.5);
        }
      }
    }

    function pulseHaptic(kind = "tap") {
      if (!state.hapticsEnabled || !navigator.vibrate) return;
      const patterns = {
        tap: 8,
        step: 12,
        lock: [18, 35, 18],
        unlock: [10, 25, 14],

        celebrate: [18, 30, 18, 30, 32],
        match: [20, 24, 20]
      };

    }

    let audioContext;

    function playSound(kind = "tap") {
      pulseHaptic(kind);
      if (!state.soundEnabled) return;
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        audioContext ||= new AudioContextClass();
        if (audioContext.state === "suspended") audioContext.resume();

        const patterns = {
          tap: { notes: [659, 880], spacing: 0.045, volume: 0.038 },
          step: { notes: [523, 659, 784], spacing: 0.055, volume: 0.045 },
          lock: { notes: [523, 440, 349], spacing: 0.075, volume: 0.04 },
          unlock: { notes: [392, 523, 659, 784], spacing: 0.06, volume: 0.05 },
          reveal: { notes: [659, 784, 1047], spacing: 0.045, volume: 0.052 },
          celebrate: { notes: [523, 659, 784, 1047, 1319], spacing: 0.055, volume: 0.055 },
          match: { notes: [784, 988, 1175, 1568], spacing: 0.07, volume: 0.065 }
        };
        const pattern = patterns[kind] || patterns.tap;
        const soundStyle = {
          cute: { ratio: 1, oscillator: "sine", shimmer: "triangle" },
          dreamy: { ratio: 0.76, oscillator: "sine", shimmer: "sine" },
          arcade: { ratio: 1.18, oscillator: "square", shimmer: "triangle" }
        }[state.soundTheme] || { ratio: 1, oscillator: "sine", shimmer: "triangle" };
        const currentTopic = getSelectedQuestions?.()?.[state.questionIndex]?.topic;
        const categoryRatio = { connection: 1, lifestyle: 0.94, future: 1.08, love: 1.16, fun: 1.25, spicy: 0.88, money: 0.8, politics: 0.74, dealbreakers: 0.68 }[currentTopic] || 1;
        const start = audioContext.currentTime;
        pattern.notes.forEach((frequency, index) => {
          const noteStart = start + index * pattern.spacing;
          const oscillator = audioContext.createOscillator();
          const shimmer = audioContext.createOscillator();
          const gain = audioContext.createGain();
          const shimmerGain = audioContext.createGain();
          oscillator.type = soundStyle.oscillator;
          shimmer.type = soundStyle.shimmer;
          oscillator.frequency.value = frequency * soundStyle.ratio * categoryRatio;
          shimmer.frequency.value = frequency * soundStyle.ratio * categoryRatio * 2;
          gain.gain.setValueAtTime(0.0001, noteStart);
          gain.gain.exponentialRampToValueAtTime(pattern.volume * state.soundVolume, noteStart + 0.012);
          gain.gain.exponentialRampToValueAtTime(0.0001, noteStart + 0.24);
          shimmerGain.gain.setValueAtTime(0.0001, noteStart);
          shimmerGain.gain.exponentialRampToValueAtTime(pattern.volume * state.soundVolume * 0.18, noteStart + 0.02);
          shimmerGain.gain.exponentialRampToValueAtTime(0.0001, noteStart + 0.16);
          oscillator.connect(gain);
          shimmer.connect(shimmerGain);
          gain.connect(audioContext.destination);
          shimmerGain.connect(audioContext.destination);
          oscillator.onended = () => {
            gain.disconnect();
            oscillator.disconnect();
          };
          shimmer.onended = () => {
            shimmerGain.disconnect();
            shimmer.disconnect();
          };
          oscillator.start(noteStart);
          shimmer.start(noteStart);
          oscillator.stop(noteStart + 0.25);
          shimmer.stop(noteStart + 0.18);
        });
      } catch {
        // Sound is an enhancement; gameplay remains available without it.
      }
    }

    function escapeHTML(value) {

        .replaceAll("&", "&amp;")

    function normalizeAnswer(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[^a-z0-9\s]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function textSimilarity(first, second) {
      const a = normalizeAnswer(first);
      const b = normalizeAnswer(second);
      if (!a || !b) return 0;
      if (a === b) return 1;

      const aTokens = new Set(a.split(" ").filter((word) => word.length > 2));
      const bTokens = new Set(b.split(" ").filter((word) => word.length > 2));
      const intersection = [...aTokens].filter((word) => bTokens.has(word)).length;
      const union = new Set([...aTokens, ...bTokens]).size;
      const tokenScore = union ? intersection / union : 0;

      const bigrams = (text) => {
        const pairs = [];
        for (let index = 0; index < text.length - 1; index += 1) pairs.push(text.slice(index, index + 2));
        return pairs;
      };
      const aPairs = bigrams(a);
      const bPairs = bigrams(b);
      const available = [...bPairs];
      let pairMatches = 0;
      aPairs.forEach((pair) => {
        const matchIndex = available.indexOf(pair);
        if (matchIndex >= 0) {
          pairMatches += 1;
          available.splice(matchIndex, 1);
        }
      });
      const characterScore = aPairs.length + bPairs.length
        ? (2 * pairMatches) / (aPairs.length + bPairs.length)
        : 0;
      return Math.max(characterScore, tokenScore * 0.92);
    }

    function getMatchInfo(question, firstAnswer, secondAnswer) {
      if (question.type === "slider") {
        const gap = Math.abs(Number(firstAnswer) - Number(secondAnswer));
        const percent = Math.round((1 - gap / 9) * 100);
        if (gap === 0) return { isMatch: true, exact: true, percent, gap, label: "Perfect match", color: "#fbbf24" };
        if (gap === 1) return { isMatch: true, exact: false, percent, gap, label: "Nearly identical", color: "#4ade80" };
        if (gap === 2) return { isMatch: false, exact: false, percent, gap, label: "Very close", color: "#86efac" };
        if (gap <= 4) return { isMatch: false, exact: false, percent, gap, label: "A little distance", color: "#facc15" };
        if (gap <= 6) return { isMatch: false, exact: false, percent, gap, label: "Different temperatures", color: "#fb923c" };
        return { isMatch: false, exact: false, percent, gap, label: "Opposite ends", color: "#fb7185" };
      }

      const similarity = textSimilarity(firstAnswer, secondAnswer);
      const percent = Math.round(similarity * 100);
      const exact = normalizeAnswer(firstAnswer) === normalizeAnswer(secondAnswer);
      if (exact) return { isMatch: true, exact: true, percent: 100, label: "Same answer", color: "#fbbf24" };
      if (similarity >= 0.72) return { isMatch: true, exact: false, percent, label: "Strong wording match", color: "#4ade80" };
      if (similarity >= 0.48) return { isMatch: false, exact: false, percent, label: "Similar themes", color: "#86efac" };
      if (similarity >= 0.24) return { isMatch: false, exact: false, percent, label: "Some overlap", color: "#facc15" };
      return { isMatch: false, exact: false, percent, label: "Unique perspectives", color: "#a78bfa" };
    }

    function differenceMarkup(matchInfo, question) {
      const scoreCopy = question.type === "slider"
        ? `${matchInfo.gap} point${matchInfo.gap === 1 ? "" : "s"} apart`
        : `${matchInfo.percent}% wording overlap`;
      return `
        <div class="difference-panel" style="--match-color: ${matchInfo.color}; --match-percent: ${matchInfo.percent}%">
          <div class="difference-topline">
            <span class="difference-label"><span aria-hidden="true">${matchInfo.isMatch ? "★" : "●"}</span>${matchInfo.label}</span>
            <span class="difference-score">${scoreCopy}</span>
          </div>
          <div class="difference-track" aria-label="${matchInfo.percent}% similarity"><span class="difference-mask"></span></div>
        </div>
      `;
    }

    function alignmentColor(percent) {
      const score = Math.max(0, Math.min(100, Number(percent) || 0));
      return `hsl(${Math.round(score * 1.2)} 76% 56%)`;
    }

    function alignmentDescriptor(percent) {
      if (percent >= 88) return { title: "Wonderfully in sync", copy: "Your answers are dancing to nearly the same beat." };
      if (percent >= 72) return { title: "Strong alignment", copy: "You share a lot of common ground with a few interesting edges." };
      if (percent >= 55) return { title: "A colorful mix", copy: "There is meaningful overlap and plenty worth talking about." };
      if (percent >= 38) return { title: "Different wavelengths", copy: "Your perspectives diverge, which makes curiosity especially valuable." };
      return { title: "Opposites with stories", copy: "You see these questions differently—slow down and learn what shaped each answer." };
    }

    function alignmentRingMarkup(percent, caption = "aligned") {
      const score = Math.max(0, Math.min(100, Math.round(percent)));
      const color = alignmentColor(score);
      return `
        <div class="alignment-ring" style="--ring-score: ${score}; --ring-color: ${color}" role="img" aria-label="${score}% ${caption}">
          <div class="alignment-ring-content"><strong>${score}%</strong><span>${caption}</span></div>
        </div>
      `;
    }

    function ratingScore(value) {
      return { aligned: 100, nuanced: 75, discuss: 45, different: 15 }[value];
    }

    function calculateAlignmentSummaryForAnswers(questions, answers, ratings = {}, importance = [{}, {}], notReady = [{}, {}]) {
      const scored = questions.filter((question) => !notReady[0]?.[question.id] && !notReady[1]?.[question.id]).map((question) => {
        const score = question.type === "text" && ratingScore(ratings[question.id]) !== undefined
          ? ratingScore(ratings[question.id])
          : getMatchInfo(question, answers[0]?.[question.id], answers[1]?.[question.id]).percent;
        const importanceLevel = Math.max(Number(importance[0]?.[question.id] ?? 1), Number(importance[1]?.[question.id] ?? 1));
        const impact = [0.2, 0.62, 1][importanceLevel] ?? 0.62;
        const fitScore = Math.round(100 - (100 - score) * impact);
        return { question, score, fitScore, importanceLevel };
      });
      const overall = scored.length
        ? Math.round(scored.reduce((total, item) => total + item.score, 0) / scored.length)
        : 0;
      const fitOverall = scored.length
        ? Math.round(scored.reduce((total, item) => total + item.fitScore, 0) / scored.length)
        : 0;
      const topicGroups = new Map();
      scored.forEach((item) => {
        const values = topicGroups.get(item.question.topic) || [];
        values.push({ score: item.score, fitScore: item.fitScore });
        topicGroups.set(item.question.topic, values);
      });
      const topics = [...topicGroups.entries()].map(([topic, values]) => ({
        topic,
        score: Math.round(values.reduce((total, value) => total + value.score, 0) / values.length),
        fitScore: Math.round(values.reduce((total, value) => total + value.fitScore, 0) / values.length),
        count: values.length
      }));
      return { overall, fitOverall, topics, scoredCount: scored.length, unscoredCount: questions.length - scored.length };
    }

    function calculateAlignmentSummary(questions) {
      return calculateAlignmentSummaryForAnswers(questions, state.answers, state.textRatings, state.importance, state.notReady);
    }

    function burstConfetti(element, amount = 22) {

    function randomIndex(length) {
      if (window.crypto && window.crypto.getRandomValues) {
        const max = Math.floor(0x100000000 / length) * length;
        const values = new Uint32Array(1);
        do {
          window.crypto.getRandomValues(values);
        } while (values[0] >= max);
        return values[0] % length;
      }
      return Math.floor(Math.random() * length);
    }

    function shuffled(values) {
      const copy = [...values];
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const swapIndex = randomIndex(index + 1);
        [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
      }
      return copy;
    }

    function drawBalanced(pool, count) {
      const remaining = [...pool];
      const selected = [];
      while (selected.length < count && remaining.length) {
        const topics = shuffled([...new Set(remaining.map((question) => question.topic))]);
        for (const topic of topics) {
          if (selected.length >= count) break;
          const candidates = remaining.filter((question) => question.topic === topic);
          if (!candidates.length) continue;
          const chosen = candidates[randomIndex(candidates.length)];
          selected.push(chosen);
          remaining.splice(remaining.findIndex((question) => question.id === chosen.id), 1);
        }
      }
      return selected;
    }

    function questionLastUsedMap() {
      const lastUsed = new Map();
      state.completedRounds.forEach((round, roundIndex) => {
        const completedAt = Date.parse(round.completedAt);
        const usageOrder = Number.isFinite(completedAt) ? completedAt : roundIndex;
        round.questionIds.forEach((id) => {
          lastUsed.set(id, Math.max(lastUsed.get(id) ?? -Infinity, usageOrder));
        });
      });
      return lastUsed;
    }

    function freshestQuestionTier(questions) {
      if (!questions.length) return [];
      const answeredIds = new Set(state.answeredQuestionIds);
      const unanswered = questions.filter((question) => !answeredIds.has(question.id));
      if (unanswered.length) return unanswered;

      const lastUsed = questionLastUsedMap();
      const oldestUsage = Math.min(...questions.map((question) => lastUsed.get(question.id) ?? -Infinity));
      return questions.filter((question) => (lastUsed.get(question.id) ?? -Infinity) === oldestUsage);
    }

    function selectFreshQuestionIds(questionIds, limit = 15) {
      const catalogById = new Map(getQuestionCatalog().map((question) => [question.id, question]));
      const remaining = questionIds.map((id) => catalogById.get(id)).filter(Boolean);
      const selected = [];
      while (selected.length < limit && remaining.length) {
        const tier = freshestQuestionTier(remaining);
        const chosen = tier[randomIndex(tier.length)];
        selected.push(chosen.id);
        remaining.splice(remaining.findIndex((question) => question.id === chosen.id), 1);
      }
      return selected;
    }

    function chooseRoundQuestions(
      mode = "slider-heavy",
      count = 5,
      topics = DEFAULT_TOPICS
    ) {
      const selectedTopicSet = new Set(topics);
      const excludedIds = new Set([...state.excludedQuestionIds, ...state.neverQuestionIds]);
      const pool = getQuestionCatalog().filter(
        (question) => selectedTopicSet.has(question.topic) && !excludedIds.has(question.id)
      );
      const sliderTarget = mode === "sliders-only"
        ? count
        : mode === "mixed"
          ? Math.ceil(count * 0.6)
          : Math.ceil(count * 0.8);
      const textTarget = count - sliderTarget;
      const availableTopics = topics.filter((topic) => pool.some((question) => question.topic === topic));
      const topicSequence = [];
      while (topicSequence.length < count && availableTopics.length) {
        topicSequence.push(...shuffled(availableTopics));
      }
      const typeSequence = shuffled([
        ...Array.from({ length: sliderTarget }, () => "slider"),
        ...Array.from({ length: textTarget }, () => "text")
      ]);
      const selected = [];
      const selectedIds = new Set();

      for (let index = 0; index < count; index += 1) {
        const topic = topicSequence[index];
        const type = typeSequence[index];
        const remaining = pool.filter((question) => !selectedIds.has(question.id));
        const typeCompatible = remaining.filter((question) => question.type === type);
        const freshestTier = freshestQuestionTier(typeCompatible.length ? typeCompatible : remaining);
        let candidates = freshestTier.filter((question) => question.topic === topic);
        if (!candidates.length) candidates = freshestTier;
        if (!candidates.length) break;
        const chosen = candidates[randomIndex(candidates.length)];
        selected.push(chosen.id);
        selectedIds.add(chosen.id);
      }

      return selected;
    }

    function allowedTopicsForIntensity(intensity = state.questionIntensity) {
      if (intensity === "cozy") return new Set(["connection", "love", "fun"]);
      if (intensity === "curious") return new Set(DEFAULT_TOPICS);
      if (intensity === "deep") return new Set([...DEFAULT_TOPICS, "money", "politics"]);
      if (intensity === "spicy") return new Set([...DEFAULT_TOPICS, "spicy", "money", "politics"]);
      return new Set(TOPIC_OPTIONS.map((topic) => topic.id));
