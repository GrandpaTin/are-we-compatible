          : String(rawAnswer || "No saved answer");
        const comment = String(rawComment || "").trim();
        return `
          <div class="saved-answer" style="--saved-player-color: ${playerColors[playerIndex]}">
            <span class="saved-answer-name">${escapeHTML(round.names?.[playerIndex] || `Player ${playerIndex + 1}`)}</span>
            <span class="saved-answer-value">${escapeHTML(answer)}</span>
            ${comment ? `<span class="saved-answer-comment">“${escapeHTML(comment)}”</span>` : ""}
          </div>
        `;
      }).join("");
      return `
        <div class="saved-round">
          <span class="saved-round-date">${escapeHTML(formatRoundDate(round.completedAt))}</span>
          <div class="saved-answer-grid">${answers}</div>
        </div>
      `;
    }

    function renderLibrary() {
      const catalog = getQuestionCatalog();
      const answeredIds = new Set(state.answeredQuestionIds);
      const excludedIds = new Set(state.excludedQuestionIds);
      const neverIds = new Set(state.neverQuestionIds);
      const favoriteIds = new Set(state.favoriteQuestionIds);
      const answeredCount = catalog.filter((question) => answeredIds.has(question.id)).length;

      const progressCards = TOPIC_OPTIONS.map((topic) => {
        const questions = catalog.filter((question) => question.topic === topic.id);
        const answered = questions.filter((question) => answeredIds.has(question.id)).length;
        const percent = questions.length ? (answered / questions.length) * 100 : 0;
        return `
          <button class="topic-progress-card ${libraryView.topic === topic.id ? "active" : ""}" type="button" data-library-topic="${topic.id}" style="--topic-color: ${topicColor(topic.tone)}; --topic-progress: ${percent}%">
            <span class="topic-progress-top"><span>${topic.icon} ${topic.label}</span><strong>${answered}/${questions.length}</strong></span>
            <span class="topic-progress-track"><span class="topic-progress-fill"></span></span>
          </button>
        `;
      }).join("");

      app.innerHTML = `
        <section class="screen library-screen" aria-labelledby="library-title">
          <div class="library-header">
            <div>
              <p class="eyebrow">Every prompt, your way</p>
              <h2 id="library-title">Question <span class="accent-text">Library</span></h2>
              <p class="lede">Track what you have explored, exclude prompts, or add questions that are uniquely yours.</p>
            </div>
            <div class="library-overall"><strong>${answeredCount}/${catalog.length}</strong><span>questions answered together</span></div>
          </div>

          <div class="topic-progress-grid">${progressCards}</div>

          <details class="library-add" id="library-add">
            <summary>Add your own question</summary>
            <form class="custom-form" id="custom-question-form" novalidate>
              <div class="custom-form-grid">
                <label class="custom-label custom-full">Question prompt
                  <textarea class="comment-textarea custom-prompt" id="custom-prompt" maxlength="500" placeholder="What would you love to ask each other?"></textarea>
                </label>
                <label class="custom-label">Answer type
                  <select class="custom-select" id="custom-type">
                    <option value="slider">Slider (1–10)</option>
                    <option value="text">Written answer</option>
                  </select>
                </label>
                <label class="custom-label">Question pack
                  <select class="custom-select" id="custom-topic">
                    ${TOPIC_OPTIONS.map((topic) => `<option value="${topic.id}">${topic.label}</option>`).join("")}
                  </select>
                </label>
                <label class="custom-label" data-slider-label>Left label
                  <input class="custom-input" id="custom-left-label" maxlength="50" placeholder="Low / Never / Option A">
                </label>
                <label class="custom-label" data-slider-label>Right label
                  <input class="custom-input" id="custom-right-label" maxlength="50" placeholder="High / Always / Option B">
                </label>
              </div>
              <p class="error" id="custom-error" role="alert"></p>
              <div class="actions"><button class="primary-btn" type="submit">Add to library</button></div>
            </form>
          </details>

          <details class="library-add" id="pack-builder">
            <summary>Create a named pack from favorites</summary>
            <div class="custom-form">
              <p class="topic-note">Favorite questions with the ★ button, then save them together as a replayable pack.</p>
              <div class="field-grid" style="margin-top:12px">
                <label for="pack-name">Pack name<input class="custom-input" id="pack-name" maxlength="60" placeholder="Sunday night check-in"></label>
                <div class="actions" style="align-self:end;margin-top:0"><button class="primary-btn" id="save-favorite-pack" type="button">Save ${favoriteIds.size} ${favoriteIds.size === 1 ? "favorite" : "favorites"}</button></div>
              </div>
              ${state.customPacks.length ? `<div class="library-filters" style="margin-top:14px">${state.customPacks.map((pack) => `<span class="library-filter active">${escapeHTML(pack.name)} · ${pack.questionIds.length}Q <button type="button" data-delete-pack="${escapeHTML(pack.id)}" aria-label="Delete ${escapeHTML(pack.name)}" style="border:0;color:inherit;background:transparent;cursor:pointer">×</button></span>`).join("")}</div>` : ""}
              <p class="error" id="pack-error" role="alert"></p>
            </div>
          </details>

          <div class="library-controls">
            <input class="library-search" id="library-search" type="search" placeholder="Search all ${catalog.length} questions…" value="${escapeHTML(libraryView.search)}" aria-label="Search questions">
            <div class="library-filters" aria-label="Question status filters">
              ${[
                ["all", "All"],
                ["answered", "Answered"],
                ["unanswered", "Unanswered"],
                ["favorites", "★ Favorites"],
                ["excluded", "Excluded"],
                ["never", "Never ask"],
                ["valuable", "Valuable"],
                ["uncomfortable", "Uncomfortable"]
              ].map(([value, label]) => `<button class="library-filter ${libraryView.filter === value ? "active" : ""}" type="button" data-library-filter="${value}">${label}</button>`).join("")}
              <button class="library-filter ${libraryView.topic === "all" ? "active" : ""}" id="all-library-topics" type="button">All packs</button>
            </div>
          </div>
          <div class="question-library-list" id="question-library-list" aria-live="polite"></div>
        </section>
      `;

      const list = document.getElementById("question-library-list");

      function renderQuestionList() {
        const search = normalizeAnswer(libraryView.search);
        const filtered = catalog.filter((question) => {
          const answered = answeredIds.has(question.id);
          const excluded = excludedIds.has(question.id);
          const never = neverIds.has(question.id);
          const favorite = favoriteIds.has(question.id);
          const matchesStatus = libraryView.filter === "all"
            || (libraryView.filter === "answered" && answered)
            || (libraryView.filter === "unanswered" && !answered)
            || (libraryView.filter === "favorites" && favorite)
            || (libraryView.filter === "excluded" && excluded)
            || (libraryView.filter === "never" && never)
            || (libraryView.filter === "valuable" && (state.questionFlags[question.id] || []).includes("valuable"))
            || (libraryView.filter === "uncomfortable" && (state.questionFlags[question.id] || []).includes("uncomfortable"));
          const matchesTopic = libraryView.topic === "all" || question.topic === libraryView.topic;
          const matchesSearch = !search || normalizeAnswer(`${question.prompt} ${question.category} ${(question.tags || []).join(" ")}`).includes(search);
          return matchesStatus && matchesTopic && matchesSearch;
        });

        if (!filtered.length) {
          list.innerHTML = `<div class="library-empty">No questions match these filters yet.</div>`;
          return;
        }

        const visible = filtered.slice(0, libraryView.limit);
        list.innerHTML = visible.map((question) => {
          const answered = answeredIds.has(question.id);
          const excluded = excludedIds.has(question.id);
          const never = neverIds.has(question.id);
          const favorite = favoriteIds.has(question.id);
          const custom = question.id.startsWith("custom_");
          const escapedQuestionId = escapeHTML(question.id);
          const topic = TOPIC_OPTIONS.find((option) => option.id === question.topic);
          const answerHistory = state.completedRounds
            .filter((round) => round.questionIds.includes(question.id))
            .slice()
            .reverse();
          return `
            <article class="library-question ${answered ? "answered" : ""} ${excluded || never ? "excluded" : ""}">
              <span class="question-status" aria-label="${answered ? "Answered" : "Not answered"}">${answered ? "✓" : "·"}</span>
              <div class="library-question-copy">
                <strong>${escapeHTML(question.prompt)}</strong>
                <div class="library-question-meta">
                  <span>${topic?.icon || "•"} ${escapeHTML(topic?.label || question.category)}</span>
                  <span>${question.type === "slider" ? "↔ Slider" : "✎ Written"}</span>
                  ${custom ? "<span>Custom</span>" : ""}
                  ${excluded ? "<span>Excluded from rounds</span>" : ""}
                  ${never ? "<span>Never ask again</span>" : ""}
                </div>
                <div class="question-tags">${(question.tags || []).map((tag) => `<span class="question-tag">#${escapeHTML(tag)}</span>`).join("")}</div>
                ${answerHistory.length ? `
                  <details class="library-answer-history">
                    <summary>Saved answers · ${answerHistory.length} ${answerHistory.length === 1 ? "round" : "rounds"}</summary>
                    <div class="saved-round-list">
                      ${answerHistory.map((round) => savedQuestionAnswersMarkup(question, round)).join("")}
                    </div>
                  </details>
                ` : ""}
              </div>
              <div class="question-library-actions">
                <button class="favorite-button ${favorite ? "active" : ""}" type="button" data-favorite-question="${escapedQuestionId}" aria-label="${favorite ? "Remove from" : "Add to"} favorites" aria-pressed="${favorite}">★</button>
                <button class="question-library-action" type="button" data-exclude-question="${escapedQuestionId}">${excluded ? "Include" : "Exclude"}</button>
                <button class="question-library-action" type="button" data-never-question="${escapedQuestionId}">${never ? "Allow again" : "Never ask"}</button>
                <button class="question-library-action" type="button" data-edit-question="${escapedQuestionId}">Edit</button>
                <button class="question-library-action" type="button" data-duplicate-question="${escapedQuestionId}">Make a variation</button>
                <details class="feedback-menu"><summary>Feedback</summary><div class="feedback-actions">${[["valuable", "Valuable"], ["uncomfortable", "Uncomfortable"], ["rewrite", "Needs rewrite"]].map(([value, label]) => `<button class="question-library-action ${(state.questionFlags[question.id] || []).includes(value) ? "active" : ""}" type="button" data-question-flag="${value}" data-flag-question="${escapedQuestionId}">${label}</button>`).join("")}</div></details>
                ${custom ? `<button class="question-library-action" type="button" data-delete-question="${escapedQuestionId}">Delete</button>` : ""}
              </div>
            </article>
          `;
        }).join("") + (visible.length < filtered.length ? `<div class="library-load-more"><button class="secondary-btn" id="load-more-questions" type="button">Load 40 more · ${visible.length}/${filtered.length} shown</button></div>` : "");

        document.getElementById("load-more-questions")?.addEventListener("click", () => {
          libraryView.limit += 40;
          renderQuestionList();
        });

        list.querySelectorAll("[data-edit-question]").forEach((button) => button.addEventListener("click", () => openQuestionEditor(button.dataset.editQuestion)));
        list.querySelectorAll("[data-duplicate-question]").forEach((button) => button.addEventListener("click", () => {
          const source = getQuestionCatalog().find((question) => question.id === button.dataset.duplicateQuestion);
          if (!source) return;
          const topicLabel = TOPIC_OPTIONS.find((topic) => topic.id === source.topic)?.label || "Connection";
          const duplicate = { id: `custom_${Date.now()}_${randomIndex(1000000)}`, topic: source.topic, category: `Custom · ${topicLabel}`, type: source.type, prompt: `${source.prompt} (variation)`, ...(source.type === "slider" ? { labels: [...source.labels] } : {}) };
          state.customQuestions.push(duplicate);
          state.questionTagOverrides[duplicate.id] = [...(source.tags || [])];
          saveState(); playSound("match"); renderLibrary();
          requestAnimationFrame(() => openQuestionEditor(duplicate.id));
        }));
        list.querySelectorAll("[data-question-flag]").forEach((button) => button.addEventListener("click", () => {
          const id = button.dataset.flagQuestion;
          const value = button.dataset.questionFlag;
          const flags = new Set(state.questionFlags[id] || []);
          if (flags.has(value)) flags.delete(value); else flags.add(value);
          state.questionFlags[id] = [...flags];
          saveState();
          playSound(value === "valuable" ? "match" : "tap");
          renderQuestionList();
        }));

        list.querySelectorAll("[data-exclude-question]").forEach((button) => {
          button.addEventListener("click", () => {
            const id = button.dataset.excludeQuestion;
            if (excludedIds.has(id)) {
              excludedIds.delete(id);
              state.excludedQuestionIds = state.excludedQuestionIds.filter((questionId) => questionId !== id);
            } else {
              excludedIds.add(id);
              state.excludedQuestionIds = [...new Set([...state.excludedQuestionIds, id])];
            }
            saveState();
            playSound("tap");
            renderQuestionList();
          });
        });

        list.querySelectorAll("[data-favorite-question]").forEach((button) => {
          button.addEventListener("click", () => {
            const id = button.dataset.favoriteQuestion;
            if (favoriteIds.has(id)) {
              favoriteIds.delete(id);
              state.favoriteQuestionIds = state.favoriteQuestionIds.filter((questionId) => questionId !== id);
            } else {
              favoriteIds.add(id);
              state.favoriteQuestionIds = [...new Set([...state.favoriteQuestionIds, id])];
            }
            saveState();
            const packButton = document.getElementById("save-favorite-pack");
            if (packButton) packButton.textContent = `Save ${favoriteIds.size} ${favoriteIds.size === 1 ? "favorite" : "favorites"}`;
            playSound("tap");
            renderQuestionList();
          });
        });

        list.querySelectorAll("[data-never-question]").forEach((button) => {
          button.addEventListener("click", () => {
            const id = button.dataset.neverQuestion;
            if (neverIds.has(id)) {
              neverIds.delete(id);
              state.neverQuestionIds = state.neverQuestionIds.filter((questionId) => questionId !== id);
            } else {
              neverIds.add(id);
              state.neverQuestionIds = [...new Set([...state.neverQuestionIds, id])];
              state.excludedQuestionIds = state.excludedQuestionIds.filter((questionId) => questionId !== id);
              excludedIds.delete(id);
            }
            saveState(); playSound("lock"); renderQuestionList();
          });
        });

        list.querySelectorAll("[data-delete-question]").forEach((button) => {
          button.addEventListener("click", () => {
            const id = button.dataset.deleteQuestion;
            state.customQuestions = state.customQuestions.filter((question) => question.id !== id);
            state.excludedQuestionIds = state.excludedQuestionIds.filter((questionId) => questionId !== id);
            state.neverQuestionIds = state.neverQuestionIds.filter((questionId) => questionId !== id);
            state.favoriteQuestionIds = state.favoriteQuestionIds.filter((questionId) => questionId !== id);
            delete state.questionEdits[id];
            delete state.questionFlags[id];
            delete state.questionTagOverrides[id];
            state.customPacks = state.customPacks.map((pack) => ({ ...pack, questionIds: pack.questionIds.filter((questionId) => questionId !== id) }));
            state.answeredQuestionIds = state.answeredQuestionIds.filter((questionId) => questionId !== id);
            saveState();
            playSound("lock");
            renderLibrary();
          });
        });
      }

      document.getElementById("library-search").addEventListener("input", (event) => {
        libraryView.search = event.currentTarget.value;
        libraryView.limit = 40;
        renderQuestionList();
      });

      document.querySelectorAll("[data-library-filter]").forEach((button) => {
        button.addEventListener("click", () => {
          libraryView.filter = button.dataset.libraryFilter;
          libraryView.limit = 40;
          document.querySelectorAll("[data-library-filter]").forEach((item) => item.classList.toggle("active", item === button));
          playSound("tap");
          renderQuestionList();
        });
      });

      document.getElementById("all-library-topics").addEventListener("click", (event) => {
        libraryView.topic = "all";
        libraryView.limit = 40;
        document.querySelectorAll("[data-library-topic]").forEach((card) => card.classList.remove("active"));
        event.currentTarget.classList.add("active");
        playSound("tap");
        renderQuestionList();
      });

      document.querySelectorAll("[data-library-topic]").forEach((card) => {
        card.addEventListener("click", () => {
          libraryView.topic = card.dataset.libraryTopic;
          libraryView.limit = 40;
          document.querySelectorAll("[data-library-topic]").forEach((item) => item.classList.toggle("active", item === card));
          document.getElementById("all-library-topics").classList.remove("active");
          playSound("tap");
          renderQuestionList();
        });
      });

      const customType = document.getElementById("custom-type");
      customType.addEventListener("change", () => {
        document.querySelectorAll("[data-slider-label]").forEach((field) => {
          field.hidden = customType.value !== "slider";
        });
        playSound("tap");
      });

      document.getElementById("custom-question-form").addEventListener("submit", (event) => {
        event.preventDefault();
        const prompt = document.getElementById("custom-prompt").value.trim();
        const type = customType.value;
        const topic = document.getElementById("custom-topic").value;
        const leftLabel = document.getElementById("custom-left-label").value.trim();
        const rightLabel = document.getElementById("custom-right-label").value.trim();
        const error = document.getElementById("custom-error");
        if (!prompt) {
          error.textContent = "Add a question prompt first.";
          document.getElementById("custom-prompt").focus();
          return;
        }
        if (type === "slider" && (!leftLabel || !rightLabel)) {
          error.textContent = "Add both slider endpoint labels.";
          (leftLabel ? document.getElementById("custom-right-label") : document.getElementById("custom-left-label")).focus();
          return;
        }
        const topicLabel = TOPIC_OPTIONS.find((option) => option.id === topic)?.label || "Connection";
        state.customQuestions.push({
          id: `custom_${Date.now()}_${randomIndex(1000000)}`,
          topic,
          category: `Custom · ${topicLabel}`,
          type,
          prompt,
          ...(type === "slider" ? { labels: [leftLabel, rightLabel] } : {})
        });
        saveState();
        playSound("celebrate");
        renderLibrary();
      });

      document.getElementById("save-favorite-pack").addEventListener("click", () => {
        const name = document.getElementById("pack-name").value.trim();
        const error = document.getElementById("pack-error");
        if (!name) { error.textContent = "Give this pack a name first."; return; }
        if (!state.favoriteQuestionIds.length) { error.textContent = "Favorite at least one question first."; return; }
        state.customPacks.push({ id: `pack_${Date.now()}_${randomIndex(100000)}`, name, questionIds: [...state.favoriteQuestionIds] });
        saveState(); playSound("celebrate"); renderLibrary();
      });

      document.querySelectorAll("[data-delete-pack]").forEach((button) => {
        button.addEventListener("click", () => {
          state.customPacks = state.customPacks.filter((pack) => pack.id !== button.dataset.deletePack);
          saveState(); playSound("lock"); renderLibrary();
        });
      });

      renderQuestionList();
    }

    function openQuestionEditor(questionId) {
      const question = getQuestionCatalog().find((item) => item.id === questionId);
      if (!question) return;
      const isCustom = question.id.startsWith("custom_");
      const overlay = document.createElement("div");
      overlay.className = "modal-backdrop";
      overlay.innerHTML = `
        <section class="exit-dialog" role="dialog" aria-modal="true" aria-labelledby="edit-question-title">
          <p class="eyebrow">Make it yours</p>
          <h2 id="edit-question-title">Edit question</h2>
          <label class="custom-label">Prompt<textarea class="comment-textarea" id="edit-question-prompt" maxlength="500">${escapeHTML(question.prompt)}</textarea></label>
          ${question.type === "slider" ? `<div class="field-grid" style="margin-top:12px"><label>Left label<input class="custom-input" id="edit-left-label" maxlength="60" value="${escapeHTML(question.labels?.[0] || "Low")}"></label><label>Right label<input class="custom-input" id="edit-right-label" maxlength="60" value="${escapeHTML(question.labels?.[1] || "High")}"></label></div>` : ""}
          <label class="custom-label" style="margin-top:12px">Search tags<input class="custom-input" id="edit-question-tags" maxlength="180" value="${escapeHTML((state.questionTagOverrides[question.id] || []).join(", "))}" placeholder="communication, travel, boundaries"></label>
          <p class="topic-note">Separate tags with commas. Editing keeps the original question ID, history, and saved answers intact.</p>
          <p class="error" id="edit-question-error" role="alert"></p>
          <div class="dialog-actions"><button class="secondary-btn" id="cancel-question-edit" type="button">Cancel</button>${!isCustom && state.questionEdits[question.id] ? '<button class="text-btn" id="restore-question" type="button">Restore original</button>' : ""}<button class="primary-btn" id="save-question-edit" type="button">Save changes</button></div>
        </section>`;
      overlay.querySelector("#cancel-question-edit").addEventListener("click", () => overlay.remove());
      overlay.querySelector("#restore-question")?.addEventListener("click", () => {
        delete state.questionEdits[question.id];
        delete state.questionTagOverrides[question.id];
        saveState(); overlay.remove(); renderLibrary(); playSound("unlock");
      });
      overlay.querySelector("#save-question-edit").addEventListener("click", () => {
        const prompt = overlay.querySelector("#edit-question-prompt").value.trim();
        if (!prompt) { overlay.querySelector("#edit-question-error").textContent = "The question needs a prompt."; return; }
        const labels = question.type === "slider" ? [overlay.querySelector("#edit-left-label").value.trim(), overlay.querySelector("#edit-right-label").value.trim()] : undefined;
        if (question.type === "slider" && labels.some((label) => !label)) { overlay.querySelector("#edit-question-error").textContent = "Add both slider labels."; return; }
        if (isCustom) {
          const target = state.customQuestions.find((item) => item.id === question.id);
          if (target) { target.prompt = prompt; if (labels) target.labels = labels; }
        } else {
          state.questionEdits[question.id] = { prompt, ...(labels ? { labels } : {}) };
        }
        state.questionTagOverrides[question.id] = [...new Set(overlay.querySelector("#edit-question-tags").value.split(",").map((tag) => normalizeAnswer(tag)).filter(Boolean))].slice(0, 12);
        saveState(); overlay.remove(); renderLibrary(); playSound("match");
      });
      document.body.appendChild(overlay);
      overlay.querySelector("#edit-question-prompt").focus();
    }

    function renderResults() {
      const rounds = [...state.completedRounds].reverse();
      if (!rounds.length) {
        app.innerHTML = `
          <section class="screen results-screen" aria-labelledby="results-title">
            <p class="eyebrow">Results Journal</p>
            <h2 id="results-title">Your story starts after <span class="accent-text">round one.</span></h2>
            <p class="lede">Complete a round to unlock alignment trends, answer changes, and saved reflections.</p>
            <div class="actions"><button class="primary-btn" id="results-home" type="button">Start a round</button></div>
          </section>
        `;
        document.getElementById("results-home").addEventListener("click", () => navigateToScreen("setup"));
        return;
      }

      const average = Math.round(rounds.reduce((sum, round) => sum + round.alignment.overall, 0) / rounds.length);
      const averageFit = Math.round(rounds.reduce((sum, round) => sum + Number(round.alignment.fitOverall ?? round.alignment.overall), 0) / rounds.length);
      const topicMap = new Map();
      rounds.forEach((round) => round.alignment.topics.forEach((item) => {
        const values = topicMap.get(item.topic) || [];
        values.push(item.score);
        topicMap.set(item.topic, values);
      }));
      const topicTrends = [...topicMap.entries()]
        .map(([topic, values]) => ({ topic, score: Math.round(values.reduce((a, b) => a + b, 0) / values.length) }))
        .sort((a, b) => b.score - a.score);

      const questionHistory = new Map();
      [...rounds].reverse().forEach((round) => round.questionIds.forEach((id) => {
        const entries = questionHistory.get(id) || [];
        entries.push({ round, answers: [round.answers?.[0]?.[id], round.answers?.[1]?.[id]] });
        questionHistory.set(id, entries);
      }));
      const changes = [...questionHistory.entries()].flatMap(([id, entries]) => {
        if (entries.length < 2) return [];
        const previous = entries[entries.length - 2];
        const latest = entries[entries.length - 1];
        const changed = JSON.stringify(previous.answers) !== JSON.stringify(latest.answers);
        const question = getQuestionCatalog().find((item) => item.id === id);
        return changed && question ? [{ question, previous, latest }] : [];
      }).slice(0, 8);

      app.innerHTML = `
        <section class="screen results-screen" aria-labelledby="results-title">
          <p class="eyebrow">Results Journal</p>
          <h2 id="results-title">Your alignment, <span class="accent-text">over time.</span></h2>
          <p class="lede">A private record of common ground, evolving answers, and conversations worth revisiting.</p>

          <div class="journal-overview">
            <article class="journal-card" style="display:grid;place-items:center;text-align:center">
              <div class="dual-score-dashboard">${alignmentRingMarkup(average, "similarity")}${alignmentRingMarkup(averageFit, "fit")}</div>
              <h3 style="margin-top:14px">${rounds.length} completed ${rounds.length === 1 ? "round" : "rounds"}</h3>
              <p>Average answer similarity and relationship fit across your saved history</p>
            </article>
            <article class="trend-card">
              <h3>Alignment by topic</h3>
              <p>Green shows your strongest shared ground; warmer colors highlight useful conversations.</p>
              <div class="trend-list">
                ${topicTrends.map((item) => {
                  const topic = TOPIC_OPTIONS.find((option) => option.id === item.topic);

    function openPrivateReflections(roundId, playerIndex) {
      const round = state.completedRounds.find((item) => item.id === roundId);
      if (!round) return;
      const notes = round.privateNotes?.[playerIndex] || {};
      const entries = Object.entries(notes).filter(([, value]) => String(value || "").trim());
      const overlay = document.createElement("div");
      overlay.className = "modal-backdrop";
      overlay.innerHTML = `
        <section class="exit-dialog" role="dialog" aria-modal="true" aria-labelledby="reflection-title">
          <p class="eyebrow">Private reflection</p>
          <h2 id="reflection-title">Pass the device to ${escapeHTML(round.names[playerIndex])}</h2>

          <div id="private-note-content" hidden>
          <div class="saved-round-list" style="margin-top:16px;max-height:42vh">
            ${entries.length ? entries.map(([id, value]) => {
              const question = getQuestionCatalog().find((item) => item.id === id);
              return `<div class="saved-round"><strong style="display:block;font-size:.72rem">${escapeHTML(question?.prompt || "Saved question")}</strong><p class="answer-copy" style="margin-top:7px">${escapeHTML(value)}</p></div>`;
            }).join("") : '<p class="topic-note">No private reflections were saved in this round.</p>'}
          </div>
          </div>
          <div class="dialog-actions"><button class="secondary-btn" id="close-reflections" type="button">Close</button><button class="primary-btn" id="unlock-reflections" type="button">I’m ${escapeHTML(round.names[playerIndex])} — show notes</button></div>
        </section>
      `;
      overlay.querySelector("#close-reflections").addEventListener("click", () => overlay.remove());
      overlay.querySelector("#unlock-reflections").addEventListener("click", async (event) => {
        if (state.privatePinHash) {
          const pin = await requestSecret({ title: "Unlock private reflections", copy: `Enter the device PIN for ${round.names[playerIndex]}'s private notes.`, confirmLabel: "Unlock notes", minimum: 4 });
          if (!pin) return;
          if (await hashPin(pin) !== state.privatePinHash) { showToast("That PIN did not match."); return; }
        }
        document.getElementById("reflection-lock-copy").hidden = true;
        document.getElementById("private-note-content").hidden = false;
        event.currentTarget.remove();
        playSound("unlock");
      });
      document.body.appendChild(overlay);
      overlay.querySelector("#close-reflections").focus();
    }

      const form = document.getElementById("setup-form");
      const playerOne = document.getElementById("player-one");
      const playerTwo = document.getElementById("player-two");
      const error = document.getElementById("setup-error");

      const rememberNames = () => {
        state.names = [playerOne.value, playerTwo.value];
        const p1 = document.querySelector(".orbit-person.one");
        const p2 = document.querySelector(".orbit-person.two");
        if (p1) p1.textContent = initials(playerOne.value);
        if (p2) p2.textContent = initials(playerTwo.value);
        saveState();
      };

      playerOne.addEventListener("input", rememberNames);
      playerTwo.addEventListener("input", rememberNames);
      document.querySelectorAll("[data-play-style]").forEach((button) => button.addEventListener("click", () => {
        rememberNames();
        state.playStyle = button.dataset.playStyle;
        state.sessionPreset = state.sessionPreset || "custom";
        saveState();
        playSound("tap");
        render();
      }));
      document.querySelectorAll("[data-session-preset]").forEach((button) => button.addEventListener("click", () => {
        rememberNames();
        const preset = SESSION_PRESETS.find((item) => item.id === button.dataset.sessionPreset);
        if (!preset) return;
        state.sessionPreset = preset.id;
        if (preset.id !== "custom") {
          state.questionCount = preset.count;
          state.questionIntensity = preset.intensity;
          state.questionMode = preset.mode;
          state.selectedTopics = [...preset.topics];
        }
        saveState();
        playSound("unlock");
        render();
      }));
      document.getElementById("resume-round")?.addEventListener("click", () => {
        state.screen = state.resumeScreen || "question";
        state.resumeScreen = null;
        saveState();
        playSound("unlock");
        render();
      });
      document.querySelectorAll('input[name="question-intensity"]').forEach((input) => {
        input.addEventListener("change", () => {
          rememberNames();
          state.sessionPreset = "custom";
          state.questionIntensity = input.value;
          const allowed = allowedTopicsForIntensity(input.value);
          state.selectedTopics = state.selectedTopics.filter((topic) => allowed.has(topic));
          if (!state.selectedTopics.length) state.selectedTopics = [...allowed].slice(0, Math.min(3, allowed.size));
          saveState();
          playSound("tap");
          render();
        });
      });
      document.querySelectorAll('input[name="question-count"]').forEach((input) => {
        input.addEventListener("change", () => {
          state.sessionPreset = "custom";
          state.questionCount = Number(input.value);
          document.querySelectorAll("[data-mode-summary]").forEach((summary) => {
            summary.textContent = modeSummary(summary.dataset.modeSummary, state.questionCount);
          });
          playSound("tap");
          saveState();
        });
      });
      document.querySelectorAll('input[name="question-mode"]').forEach((input) => {
        input.addEventListener("change", () => {
          state.sessionPreset = "custom";
          state.questionMode = input.value;
          playSound("tap");
          saveState();
        });
      });

      const topicInputs = [...document.querySelectorAll('input[name="topics"]')];
      const rememberTopics = () => {
        state.sessionPreset = "custom";
        state.selectedTopics = topicInputs.filter((input) => input.checked && !input.disabled).map((input) => input.value);
        saveState();
      };

      topicInputs.forEach((input) => {
        input.addEventListener("change", () => {
          rememberTopics();
          playSound("tap");
        });
      });

      document.querySelectorAll("[data-topic-preset]").forEach((button) => {
        button.addEventListener("click", () => {
          const preset = button.dataset.topicPreset;
          const values = preset === "classic"
            ? new Set(DEFAULT_TOPICS)
            : preset === "bold"
              ? new Set(["spicy", "money", "politics", "dealbreakers"])
              : preset === "all"
                ? new Set(TOPIC_OPTIONS.map((topic) => topic.id))
                : new Set();
          topicInputs.forEach((input) => { input.checked = !input.disabled && values.has(input.value); });
          rememberTopics();
          playSound("tap");
        });
      });

      document.getElementById("sound-toggle").addEventListener("change", (event) => {
        state.soundEnabled = event.currentTarget.checked;
        saveState();
        if (state.soundEnabled) playSound("unlock");
      });

      document.getElementById("open-library").addEventListener("click", () => {
        state.screen = "library";
        saveState();
        playSound("unlock");
        render();
      });
      document.getElementById("open-results").addEventListener("click", () => navigateToScreen("results"));
      document.getElementById("open-settings").addEventListener("click", () => navigateToScreen("settings"));

      document.querySelectorAll("[data-start-pack]").forEach((button) => {
        button.addEventListener("click", () => {
          const pack = state.customPacks.find((item) => item.id === button.dataset.startPack);
          const names = [playerOne.value.trim(), playerTwo.value.trim()];
          if (!pack || names.some((name) => !name)) {
            error.textContent = "Add both names before starting a custom pack.";
            return;
          }
          const validIds = new Set(getQuestionCatalog().map((question) => question.id));
          const selectedQuestionIds = selectFreshQuestionIds(
            pack.questionIds.filter((id) => validIds.has(id) && !state.neverQuestionIds.includes(id)),
            15
          );
          if (!selectedQuestionIds.length) {
            error.textContent = "This pack has no available questions yet.";
            return;
          }
          const selectedTopics = [...new Set(selectedQuestionIds.map((id) => getQuestionCatalog().find((question) => question.id === id)?.topic).filter(Boolean))];
          openSensitiveConsent(selectedTopics, () => startGame({
            names,
            questionMode: "mixed",
            questionCount: selectedQuestionIds.length,
            selectedTopics,
            selectedQuestionIds
          }));
        });
      });

      document.getElementById("export-data").addEventListener("click", exportBackup);
      document.getElementById("export-encrypted").addEventListener("click", exportEncryptedBackup);
      const importInput = document.getElementById("import-file");
      document.getElementById("import-data").addEventListener("click", () => importInput.click());
      importInput.addEventListener("change", async () => {
        const file = importInput.files?.[0];
        if (!file) return;
        const status = document.getElementById("data-status");
        try {
          let payload = JSON.parse(await file.text());
          if (payload?.encrypted === true) payload = await decryptBackupWrapper(payload);
          const importedState = backupToState(payload);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(importedState));
          state = loadState();
          libraryView = { filter: "all", topic: "all", search: "", limit: 40 };
          playSound("match");
          render();
          showToast("Backup imported successfully. Your saved state is restored.");
        } catch (importError) {
          status.style.color = "var(--coral)";
          status.textContent = importError?.message || "That backup could not be imported.";
        } finally {
          importInput.value = "";
        }
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const names = [playerOne.value.trim(), playerTwo.value.trim()];
        const questionMode = form.elements["question-mode"].value;
        const questionCount = Number(form.elements["question-count"].value);
        const selectedTopics = topicInputs.filter((input) => input.checked && !input.disabled).map((input) => input.value);
        if (names.some((name) => !name)) {
          error.textContent = "Add both names to begin.";
          (names[0] ? playerTwo : playerOne).focus();
          return;
        }
        if (!selectedTopics.length) {
          error.textContent = "Choose at least one question pack.";
          document.querySelector(".topic-picker").scrollIntoView({ behavior: "smooth", block: "center" });
          return;
        }

        const selectedQuestionIds = chooseRoundQuestions(questionMode, questionCount, selectedTopics);
        if (selectedQuestionIds.length !== questionCount) {
          error.textContent = "That combination needs more questions. Add another pack or choose a shorter round.";
          return;
        }

        openSensitiveConsent(selectedTopics, () => animateRoundSelection(form.querySelector('button[type="submit"]'), () => {
          if (state.playStyle === "nearby") {
            state.names = names;
            state.questionMode = questionMode;
            state.questionCount = questionCount;
            state.selectedTopics = [...selectedTopics];
            state.selectedQuestionIds = [...selectedQuestionIds];
            state.screen = "nearby";
            saveState();
            render();
            return;
          }
          startGame({ names, questionMode, questionCount, selectedTopics, selectedQuestionIds });
        }));
      });

      document.getElementById("reset-game").addEventListener("click", openResetDialog);
      if (!state.tutorialSeen) requestAnimationFrame(openTutorial);
    }

    function renderQuestion() {
      const questions = getSelectedQuestions();
      const totalQuestions = questions.length;
      const question = questions[state.questionIndex];
      const questionTopic = TOPIC_OPTIONS.find((topic) => topic.id === question.topic);
      const playerName = state.names[state.activePlayer];
      let savedAnswer = state.answers[state.activePlayer][question.id];
      const savedComment = state.comments[state.activePlayer][question.id] || "";
      const savedPrivateNote = state.privateNotes[state.activePlayer][question.id] || "";
      const savedImportance = Number(state.importance[state.activePlayer][question.id] ?? 1);
      const isNotReady = state.notReady[state.activePlayer][question.id] === true;
      const isFavorite = state.favoriteQuestionIds.includes(question.id);

      if (question.type === "slider" && (savedAnswer === undefined || savedAnswer === null)) {
        savedAnswer = 5;
        state.answers[state.activePlayer][question.id] = savedAnswer;
        saveState();
      }

      const inputMarkup = question.type === "text"
        ? `
          <label class="answer-label" for="answer-input">Your answer</label>
          <textarea class="answer-textarea" id="answer-input" maxlength="600" placeholder="Write what feels true to you…" aria-describedby="answer-error">${escapeHTML(savedAnswer || "")}</textarea>
        `
        : `
          <div class="slider-panel">
            <div class="slider-value" id="slider-value" aria-hidden="true">${Number(savedAnswer)}</div>
            <input
              class="range-input"
              id="answer-input"
              type="range"
              min="1"
              max="10"
              step="1"
              value="${Number(savedAnswer)}"
              style="--range-progress: ${((Number(savedAnswer) - 1) / 9) * 100}%"
              aria-label="${escapeHTML(question.prompt)}"
              aria-valuetext="${Number(savedAnswer)} out of 10"
            >
            <div class="range-labels" aria-hidden="true">
              <span>1 · ${escapeHTML(question.labels?.[0] || "Low")}</span>
              <span>${escapeHTML(question.labels?.[1] || "High")} · 10</span>
            </div>
          </div>
          <details class="comment-details" ${savedComment ? "open" : ""}>
            <summary>Add context to your slider answer <span aria-hidden="true">(optional)</span></summary>
            <textarea class="comment-textarea" id="comment-input" maxlength="400" placeholder="Why did you choose that number?">${escapeHTML(savedComment)}</textarea>
          </details>
        `;

      app.innerHTML = `
        <section class="screen question-screen" aria-labelledby="question-title" style="--question-color:${topicColor(questionTopic?.tone)}">
          <div class="question-header">
            <div>
              <p class="eyebrow">Now answering</p>
              <p class="turn-name">${escapeHTML(playerName)}</p>
            </div>
            <div class="progress-copy">
              <span class="round-mode-copy">${escapeHTML(modeSummary(state.questionMode, totalQuestions))}</span>
              ${state.questionIndex + 1} / ${totalQuestions}
            </div>
          </div>
          <div class="progress-track" aria-label="Question ${state.questionIndex + 1} of ${totalQuestions}">
            <div class="progress-bar" style="width: ${((state.questionIndex + 1) / totalQuestions) * 100}%"></div>
          </div>
          <div class="progress-constellation" aria-hidden="true">
            ${Array.from({ length: totalQuestions }, (_, index) => {
              const status = index < state.questionIndex ? "done" : index === state.questionIndex ? "active" : "";
              return `<span class="progress-star ${status}">${index < state.questionIndex ? "✓" : index === state.questionIndex ? "✦" : "•"}</span>`;
            }).join("")}
          </div>

          <form class="question-card" id="question-form" style="--question-color:${topicColor(questionTopic?.tone)}" novalidate>
            <div class="question-decor" aria-hidden="true"><span></span><span></span><span></span></div>
            <div class="question-meta">
              <span class="category-pill"><span class="category-symbol">${categorySymbol(question.category)}</span>${escapeHTML(question.category)}</span>
              <span style="display:flex;gap:8px;align-items:center">
                <button class="favorite-button ${isFavorite ? "active" : ""}" id="favorite-current" type="button" aria-label="${isFavorite ? "Remove from" : "Add to"} favorites" aria-pressed="${isFavorite}">★</button>
                <span class="type-chip"><span aria-hidden="true">${question.type === "slider" ? "↔" : "✎"}</span>${question.type === "slider" ? "Slide your answer" : "Write your answer"}</span>
              </span>
            </div>
            <h2 class="prompt" id="question-title">${escapeHTML(question.prompt)}</h2>
            ${inputMarkup}
            <div class="importance-panel">
              <strong>How much does this topic matter to you?</strong>
              <div class="importance-options" role="group" aria-label="Importance of this question">
                ${IMPORTANCE_LEVELS.map((level) => `<button class="importance-option ${savedImportance === level.value ? "active" : ""}" type="button" data-importance="${level.value}" aria-pressed="${savedImportance === level.value}">${level.icon} ${level.label}</button>`).join("")}
              </div>
              <button class="secondary-btn not-ready-button ${isNotReady ? "active" : ""}" id="not-ready-answer" type="button" aria-pressed="${isNotReady}">${isNotReady ? "Not ready — this won’t be scored" : "I’m not ready to answer this"}</button>
            </div>
            <details class="private-reflection" ${savedPrivateNote ? "open" : ""}>
              <summary>Private reflection for ${escapeHTML(playerName)}</summary>
              <p class="topic-note">Hidden from the reveal board. Reopen it later from the Results Journal when you have the device.</p>
              <textarea class="private-note-input" id="private-note-input" maxlength="500" placeholder="What do you want to remember about your answer?">${escapeHTML(savedPrivateNote)}</textarea>
            </details>
            <p class="error" id="answer-error" role="alert"></p>
            <div class="actions question-actions">
              ${state.questionIndex > 0 ? '<button class="secondary-btn" id="back-question" type="button">Back</button>' : ""}
              <button class="text-btn" id="skip-question" type="button">Skip this prompt</button>
              <button class="primary-btn" type="submit">${state.questionIndex === totalQuestions - 1 ? "Lock my answers" : "Next question"}</button>
            </div>
          </form>
        </section>
      `;

      const form = document.getElementById("question-form");
      const input = document.getElementById("answer-input");
      const error = document.getElementById("answer-error");

      document.getElementById("favorite-current").addEventListener("click", (event) => {
        const button = event.currentTarget;
        const nowFavorite = !state.favoriteQuestionIds.includes(question.id);
        state.favoriteQuestionIds = nowFavorite
          ? [...new Set([...state.favoriteQuestionIds, question.id])]
          : state.favoriteQuestionIds.filter((id) => id !== question.id);
        button.classList.toggle("active", nowFavorite);
        button.setAttribute("aria-pressed", String(nowFavorite));
        saveState();
        playSound("tap");
      });

      document.getElementById("private-note-input").addEventListener("input", (event) => {
        state.privateNotes[state.activePlayer][question.id] = event.currentTarget.value;
        saveState();
      });

      document.querySelectorAll("[data-importance]").forEach((button) => button.addEventListener("click", () => {
        state.importance[state.activePlayer][question.id] = Number(button.dataset.importance);
        document.querySelectorAll("[data-importance]").forEach((item) => {
          const active = item === button;
          item.classList.toggle("active", active);
          item.setAttribute("aria-pressed", String(active));
        });
        saveState();
        playSound("tap");
      }));

      document.getElementById("not-ready-answer").addEventListener("click", (event) => {
        const active = !state.notReady[state.activePlayer][question.id];
        state.notReady[state.activePlayer][question.id] = active;
        event.currentTarget.classList.toggle("active", active);
        event.currentTarget.setAttribute("aria-pressed", String(active));
        event.currentTarget.textContent = active ? "Not ready — this won’t be scored" : "I’m not ready to answer this";
        error.textContent = active ? "That’s completely okay. This question will remain private and unscored." : "";
        saveState();
        playSound("lock");
      });

      document.getElementById("skip-question").addEventListener("click", () => {
        const unavailable = new Set([...state.selectedQuestionIds, ...state.excludedQuestionIds, ...state.neverQuestionIds]);
        const catalog = getQuestionCatalog();
        const eligibleReplacements = catalog.filter(
          (item) => state.selectedTopics.includes(item.topic) && item.type === question.type && !unavailable.has(item.id)
        );
        const freshestTier = freshestQuestionTier(eligibleReplacements);
        let replacements = freshestTier.filter((item) => item.topic === question.topic);
        if (!replacements.length) replacements = freshestTier;
        if (!replacements.length) {
          error.textContent = "No replacement question is available for this round.";
          return;
        }
        const replacement = replacements[randomIndex(replacements.length)];
        state.selectedQuestionIds[state.questionIndex] = replacement.id;
        saveState();
        playSound("step");
        render();
      });

      input.addEventListener("input", () => {
        const value = question.type === "slider" ? Number(input.value) : input.value;
        state.answers[state.activePlayer][question.id] = value;
        if (state.notReady[state.activePlayer][question.id]) {
          state.notReady[state.activePlayer][question.id] = false;
          document.getElementById("not-ready-answer").classList.remove("active");
          document.getElementById("not-ready-answer").setAttribute("aria-pressed", "false");
          document.getElementById("not-ready-answer").textContent = "I’m not ready to answer this";
        }
        saveState();

        if (question.type === "slider") {
          document.getElementById("slider-value").textContent = input.value;
          input.style.setProperty("--range-progress", `${((Number(input.value) - 1) / 9) * 100}%`);
          input.setAttribute("aria-valuetext", `${input.value} out of 10`);
        }
      });

      if (question.type === "slider") {
        input.addEventListener("change", () => playSound("tap"));
        const commentInput = document.getElementById("comment-input");
        commentInput.addEventListener("input", () => {
          state.comments[state.activePlayer][question.id] = commentInput.value;
          saveState();
        });
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const value = question.type === "slider" ? Number(input.value) : input.value.trim();
        const notReady = state.notReady[state.activePlayer][question.id] === true;
        if (question.type === "text" && !value && !notReady) {
          error.textContent = "Add an answer before continuing.";
          input.focus();
          return;
        }

        if (!notReady) state.answers[state.activePlayer][question.id] = value;
        if (state.questionIndex < totalQuestions - 1) {
          state.questionIndex += 1;
          playSound("step");
        } else if (state.playStyle === "nearby") {
          const payload = nearbyPlayerPayload();
          nearbyRuntime.localComplete = true;
          sendNearbyMessage(payload);
          state.screen = "nearby-wait";
          playSound("lock");
          saveState();
          finishNearbyRoundIfReady();
          if (state.screen === "celebration") return;
        } else if (state.activePlayer === 0) {
          state.screen = "intermission";
          state.questionIndex = 0;
          playSound("lock");
        } else {
          state.completedRounds = [...state.completedRounds, createCompletedRoundSnapshot()];
          state.screen = "celebration";
          state.revealedIds = [];
          state.answeredQuestionIds = [
            ...new Set([...state.answeredQuestionIds, ...state.selectedQuestionIds])
          ];
          playSound("celebrate");
        }
        saveState();
        render();
      });

      const backButton = document.getElementById("back-question");
      if (backButton) {
        backButton.addEventListener("click", () => {
          state.questionIndex -= 1;
          playSound("tap");
          saveState();
          render();
        });
      }

      if (question.type === "text") input.focus();
    }

    function renderIntermission() {
      const nextPlayer = state.names[1];
      app.innerHTML = `
        <section class="screen lock-screen" aria-labelledby="lock-title">
          <div class="lock-card">
            <div class="lock-icon" aria-hidden="true">♥</div>
            <p class="eyebrow">Answers locked</p>
            <h2 id="lock-title">Pass the device to<br><span class="accent-text">${escapeHTML(nextPlayer)}</span></h2>
            <p class="lock-copy">${escapeHTML(state.names[0])}'s answers are safely hidden. When ${escapeHTML(nextPlayer)} has the device, unlock the next turn.</p>
            <div class="pass-visual" aria-hidden="true">
              <span class="pass-person one">${escapeHTML(initials(state.names[0]))}</span>
              <span class="pass-path"></span>
              <span class="pass-person two">${escapeHTML(initials(nextPlayer))}</span>
            </div>
            <div class="actions lock-actions">
              <button class="primary-btn" id="unlock-turn" type="button">I’m ${escapeHTML(nextPlayer)} — unlock</button>
            </div>
          </div>
        </section>
      `;

      document.getElementById("unlock-turn").addEventListener("click", () => {

        state.questionIndex = 0;
        state.screen = "question";
        saveState();

      });

            <div class="celebration-orb" aria-hidden="true">♡</div>
            <p class="eyebrow">Answers complete</p>
            <h2 id="celebration-title">You both showed up <span class="accent-text">honestly.</span></h2>

    function importanceMarkup(question) {

        const level = IMPORTANCE_LEVELS.find((item) => item.value === Number(values?.[question.id] ?? 1)) || IMPORTANCE_LEVELS[1];
