    }

    function sliderReveal(question, firstAnswer, secondAnswer, matchInfo) {
      const p1 = ((Number(firstAnswer) - 1) / 9) * 100;
      const p2 = ((Number(secondAnswer) - 1) / 9) * 100;
      const firstComment = String(state.comments[0][question.id] || "").trim();
      const secondComment = String(state.comments[1][question.id] || "").trim();
      const commentsMarkup = firstComment || secondComment
        ? `
          <div class="slider-comments">
            ${firstComment ? `<div class="slider-comment" style="--player-color: var(--blue)"><strong>${escapeHTML(state.names[0])}</strong><br>${escapeHTML(firstComment)}</div>` : ""}
            ${secondComment ? `<div class="slider-comment" style="--player-color: var(--green)"><strong>${escapeHTML(state.names[1])}</strong><br>${escapeHTML(secondComment)}</div>` : ""}
          </div>
        `
        : "";
      return `
        <div class="comparison-wrap">
          <div class="comparison-scale">
            <span>1 · ${escapeHTML(question.labels?.[0] || "Low")}</span>
            <span>${escapeHTML(question.labels?.[1] || "High")} · 10</span>
          </div>
          <div class="comparison-track" style="--p1-pos: ${p1}%; --p2-pos: ${p2}%">
            <div class="comparison-gap" aria-hidden="true"></div>
            <div class="marker marker-one" style="--marker-pos: ${p1}%; --marker-color: var(--blue); --marker-offset: -2px" aria-hidden="true">
              <span class="marker-value">${Number(firstAnswer)}</span>
            </div>
            <div class="marker marker-two" style="--marker-pos: ${p2}%; --marker-color: var(--green); --marker-offset: 2px" aria-hidden="true">
              <span class="marker-value">${Number(secondAnswer)}</span>
            </div>
          </div>
          <div class="comparison-legend">
            <span class="legend-item"><span class="legend-dot" style="--dot-color: var(--blue)"></span>${escapeHTML(state.names[0])}: ${Number(firstAnswer)}</span>
            <span class="legend-item"><span class="legend-dot" style="--dot-color: var(--green)"></span>${escapeHTML(state.names[1])}: ${Number(secondAnswer)}</span>
          </div>
          ${differenceMarkup(matchInfo, question)}
          ${importanceMarkup(question)}
          ${commentsMarkup}
        </div>
      `;
    }

    function textReveal(question, firstAnswer, secondAnswer, matchInfo) {
      const escapedQuestionId = escapeHTML(question.id);
      const ratings = [
        ["aligned", "Aligned", "#4ade80"],
        ["nuanced", "Similar + nuance", "#86efac"],
        ["discuss", "Worth discussing", "#fbbf24"],
        ["different", "Very different", "#fb7185"]
      ];
      return `
        <div class="answer-stack">
          <div class="answer-box" style="--player-color: var(--blue)">
            <span class="answer-name">${escapeHTML(state.names[0])}</span>
            <p class="answer-copy">${escapeHTML(firstAnswer)}</p>
          </div>
          <div class="answer-box" style="--player-color: var(--green)">
            <span class="answer-name">${escapeHTML(state.names[1])}</span>
            <p class="answer-copy">${escapeHTML(secondAnswer)}</p>
          </div>
        </div>
        ${differenceMarkup(matchInfo, question)}
        ${importanceMarkup(question)}
        <div class="alignment-rating">
          <strong>How aligned do these answers feel to both of you?</strong>
          <div class="rating-options">
            ${ratings.map(([value, label, color]) => `<button class="rating-option ${state.textRatings[question.id] === value ? "active" : ""}" style="--rating-color:${color}" type="button" data-text-rating="${value}" data-rating-question="${escapedQuestionId}">${label}</button>`).join("")}
          </div>
        </div>
      `;
    }

    function discussionPromptMarkup(question, matchInfo) {
      const tier = matchInfo.percent >= 75 ? "close" : matchInfo.percent >= 48 ? "medium" : "far";
      const prompts = DISCUSSION_PROMPTS[tier];
      const seed = [...question.id].reduce((total, character) => total + character.charCodeAt(0), 0);
      return `
        <div class="discussion-card">
          <strong>Keep the conversation going</strong>
          <p>${escapeHTML(prompts[seed % prompts.length])}</p>
        </div>
      `;
    }

    function renderReveal() {
      const questions = getSelectedQuestions();
      const alignment = calculateAlignmentSummary(questions);
      const alignmentCopy = alignmentDescriptor(alignment.overall);
      const overallColor = alignmentColor(alignment.overall);
      const topicAlignmentCards = alignment.topics.map((item) => {
        const topic = TOPIC_OPTIONS.find((option) => option.id === item.topic);
        return `
          <div class="topic-alignment-card">
            ${alignmentRingMarkup(item.score, "similar")}
            <span class="topic-alignment-name">${topic?.icon || "•"} ${escapeHTML(topic?.label || item.topic)} · ${item.fitScore}% fit · ${item.count}Q</span>
          </div>
        `;
      }).join("");
      const matchInfoById = new Map();
      const scoredHighlights = questions.filter((question) => !state.notReady[0]?.[question.id] && !state.notReady[1]?.[question.id]).map((question) => ({
        question,
        match: getMatchInfo(question, state.answers[0][question.id], state.answers[1][question.id]),
        importance: Math.max(Number(state.importance[0]?.[question.id] ?? 1), Number(state.importance[1]?.[question.id] ?? 1))
      }));
      const closestHighlight = [...scoredHighlights].sort((a, b) => b.match.percent - a.match.percent)[0];
      const surpriseHighlight = [...scoredHighlights].sort((a, b) => a.match.percent - b.match.percent)[0];
      const conversationHighlight = [...scoredHighlights].sort((a, b) => (b.importance * (100 - b.match.percent)) - (a.importance * (100 - a.match.percent)))[0];
      const cards = questions.map((question, index) => {
        const isFlipped = state.revealedIds.includes(question.id);
        const escapedQuestionId = escapeHTML(question.id);
        const firstAnswer = state.answers[0][question.id];
        const secondAnswer = state.answers[1][question.id];
        const answerHeld = state.notReady[0]?.[question.id] || state.notReady[1]?.[question.id];
        const matchInfo = answerHeld
          ? { isMatch: false, exact: false, percent: 0, gap: 0, label: "Not scored", color: "#a78bfa" }
          : getMatchInfo(question, firstAnswer, secondAnswer);
        matchInfoById.set(question.id, matchInfo);
        const answers = answerHeld
          ? notReadyReveal(question)
          : question.type === "slider"
          ? sliderReveal(question, firstAnswer, secondAnswer, matchInfo)
          : textReveal(question, firstAnswer, secondAnswer, matchInfo);

        return `
          <article
            class="flip-card${isFlipped ? " flipped" : ""}"
            data-question-id="${escapedQuestionId}"
          >
            <div class="flip-card-inner">
              <button
                class="card-face card-front"
                type="button"
                aria-expanded="${isFlipped}"
                aria-controls="answer-card-${escapedQuestionId}"
                aria-label="Reveal answers for question ${index + 1}"
                aria-hidden="${isFlipped}"
                ${isFlipped ? "inert" : ""}
              >
                <span>
                  <span class="card-number"><span class="card-spark">${categorySymbol(question.category)}</span>${escapeHTML(question.category)} · ${index + 1} of ${questions.length}</span>
                  <span class="card-question">${escapeHTML(question.prompt)}</span>
                </span>
                <span class="tap-hint">Tap to reveal</span>
                <span class="card-pair" aria-hidden="true"><span></span><span></span></span>
              </button>
              <div
                class="card-face card-back ${!answerHeld && matchInfo.isMatch ? "match-card" : ""}"
                id="answer-card-${escapedQuestionId}"
                role="region"
                aria-label="Answers for question ${index + 1}"
                aria-hidden="${!isFlipped}"
                ${isFlipped ? "" : "inert"}
              >
                <span class="card-number"><span class="card-spark">${categorySymbol(question.category)}</span>${escapeHTML(question.category)} · Your answers</span>
                <span class="card-question">${escapeHTML(question.prompt)}</span>
                ${!answerHeld && matchInfo.isMatch ? `<span class="match-badge"><span class="match-star" aria-hidden="true">★</span>${matchInfo.exact ? "Exact match" : "Close match"}</span>` : ""}
                ${answers}
                ${answerHeld ? `<div class="discussion-card"><strong>Gentle next step</strong><p>Would revisiting this later feel supportive, or is leaving it unanswered the right boundary?</p></div>` : discussionPromptMarkup(question, matchInfo)}
                ${followThroughMarkup(question)}
                <button class="tap-hint card-close-button" type="button">Tap to close</button>
              </div>
            </div>
          </article>
        `;
      }).join("");

      app.innerHTML = `
        <section class="screen reveal-screen" aria-labelledby="reveal-title">
          <div class="reveal-heading">
            <div>
              <div class="reveal-buddies" aria-hidden="true">
                <span class="reveal-buddy one">${escapeHTML(initials(state.names[0]))}</span>
                <span class="reveal-buddy two">${escapeHTML(initials(state.names[1]))}</span>
              </div>
              <p class="eyebrow">The reveal board</p>
              <h2 id="reveal-title">Compare, connect, <span class="accent-text">talk.</span></h2>
              <p class="lede">Tap each card when you’re ready to see where your answers meet.</p>
            </div>
            <button class="secondary-btn reveal-all-btn" id="reveal-all" type="button"><span aria-hidden="true">✦</span><span>${state.revealedIds.length === questions.length ? "Hide all" : "Reveal all"}</span></button>
          </div>
          <section class="alignment-dashboard" style="--overall-color: ${overallColor}" aria-labelledby="alignment-title">
            <div class="dual-score-dashboard">
              <div class="overall-alignment">
                ${alignmentRingMarkup(alignment.overall, "similarity")}
                <div class="alignment-summary-copy">
                  <p class="eyebrow">Answer similarity</p>
                  <h3 id="alignment-title">${alignmentCopy.title}</h3>
                  <p class="score-explainer">How close the answers were, without judging whether a difference matters.</p>
                </div>
              </div>
              <div class="overall-alignment">
                ${alignmentRingMarkup(alignment.fitOverall, "fit")}
                <div class="alignment-summary-copy">
                  <p class="eyebrow">Relationship fit</p>
                  <h3>${alignmentDescriptor(alignment.fitOverall).title}</h3>
                  <p class="score-explainer">Adjusts each difference by how important the topic felt to either person.</p>
                </div>
              </div>
            </div>
            <div class="topic-alignment-area">
              <p class="topic-alignment-title">Alignment by question pack</p>
              <div class="topic-alignment-grid">${topicAlignmentCards}</div>
              <div class="alignment-legend"><span>Less aligned</span><span class="heat-gradient"></span><span>More aligned</span></div>
            </div>
          </section>
          <section class="highlight-grid" aria-label="Round highlights">
            <article class="highlight-card"><span>Closest match</span><strong>${escapeHTML(closestHighlight?.question.prompt || "Complete more scored answers to unlock this highlight.")}</strong></article>
            <article class="highlight-card"><span>Biggest surprise</span><strong>${escapeHTML(surpriseHighlight?.question.prompt || "No scored surprise yet.")}</strong></article>
            <article class="highlight-card"><span>Best conversation starter</span><strong>${escapeHTML(conversationHighlight?.question.prompt || "No conversation pick yet.")}</strong></article>
          </section>
          <div class="reveal-grid">${cards}</div>
          <div class="actions reveal-actions">
            ${state.playStyle === "nearby" && nearbyRuntime.role === "join"
              ? `<button class="primary-btn" id="new-round" type="button" disabled style="opacity:0.6;cursor:not-allowed">Waiting for host...</button>`
              : `<button class="primary-btn" id="new-round" type="button">Play another round</button>`
            }
            <button class="text-btn" id="start-over" type="button">Change players</button>
          </div>
          <p class="footer-note">There are no right answers—only new things to learn about each other.</p>
        </section>
      `;

      const flipCards = [...document.querySelectorAll(".flip-card")];

      document.querySelectorAll("[data-text-rating]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          state.textRatings[button.dataset.ratingQuestion] = button.dataset.textRating;
          if (state.playStyle === "nearby") sendNearbyMessage({ type: "text-rating", questionId: button.dataset.ratingQuestion, rating: button.dataset.textRating });
          syncLatestRoundSnapshot();
          saveState();
          playSound("tap");
          const scrollPosition = window.scrollY;
          render();
          requestAnimationFrame(() => window.scrollTo({ top: scrollPosition, behavior: "auto" }));
        });
      });

      document.querySelectorAll("[data-follow-through]").forEach((button) => button.addEventListener("click", (event) => {
        event.stopPropagation();
        const questionId = button.dataset.followQuestion;
        state.conversationStatus[questionId] = button.dataset.followThrough;
        if (state.playStyle === "nearby") sendNearbyMessage({ type: "follow-through", questionId, status: button.dataset.followThrough });
        syncLatestRoundSnapshot();
        saveState();
        playSound("tap");
        const scrollPosition = window.scrollY;
        render();
        requestAnimationFrame(() => window.scrollTo({ top: scrollPosition, behavior: "auto" }));
      }));

      document.querySelectorAll("[data-intention-input]").forEach((input) => {
        input.addEventListener("click", (event) => event.stopPropagation());
        input.addEventListener("input", (event) => {
          event.stopPropagation();
          const questionId = input.dataset.intentionInput;
          const existing = state.sharedIntentions.find((item) => item.questionId === questionId);
          if (existing) existing.text = input.value;
          else state.sharedIntentions.push({ id: `intention_${Date.now()}_${randomIndex(10000)}`, questionId, text: input.value, createdAt: new Date().toISOString(), completed: false });
          if (state.playStyle === "nearby") sendNearbyMessage({ type: "intention-update", questionId, text: input.value });
          syncLatestRoundSnapshot();
          saveState();
        });
      });
      document.querySelectorAll("[data-reveal-flag]").forEach((button) => button.addEventListener("click", (event) => {
        event.stopPropagation();
        const id = button.dataset.flagQuestion;
        const flags = new Set(state.questionFlags[id] || []);
        if (flags.has(button.dataset.revealFlag)) flags.delete(button.dataset.revealFlag); else flags.add(button.dataset.revealFlag);
        state.questionFlags[id] = [...flags];
        button.classList.toggle("active", flags.has(button.dataset.revealFlag));
        saveState(); playSound("tap");
      }));

      function sizeCard(card) {
        const front = card.querySelector(".card-front");
        const back = card.querySelector(".card-back");
        const activeFace = card.classList.contains("flipped") ? back : front;
        const requiredHeight = Math.max(activeFace.scrollHeight, 210);
        card.style.height = `${requiredHeight}px`;
      }

      function sizeAllCards() {
        flipCards.forEach(sizeCard);
      }

      function updateRevealAllButton() {
        const label = document.querySelector("#reveal-all span:last-child");
        label.textContent = state.revealedIds.length === questions.length ? "Hide all" : "Reveal all";
      }

      function applyCardState(card, shouldReveal) {
        const front = card.querySelector(".card-front");
        const back = card.querySelector(".card-back");
        card.classList.toggle("flipped", shouldReveal);
        front.setAttribute("aria-expanded", String(shouldReveal));
        front.setAttribute("aria-hidden", String(shouldReveal));
        back.setAttribute("aria-hidden", String(!shouldReveal));
        front.inert = shouldReveal;
        back.inert = !shouldReveal;
      }

      function toggleCard(card) {
        const id = card.dataset.questionId;
        const shouldReveal = !card.classList.contains("flipped");
        applyCardState(card, shouldReveal);
        state.revealedIds = shouldReveal
          ? [...new Set([...state.revealedIds, id])]
          : state.revealedIds.filter((revealedId) => revealedId !== id);
        if (state.playStyle === "nearby") sendNearbyMessage({ type: "reveal-state", revealedIds: state.revealedIds });
        const matchInfo = matchInfoById.get(id);
        if (shouldReveal && matchInfo?.isMatch) {
          playSound("match");
          burstConfetti(card, 26);
        } else {
          playSound(shouldReveal ? "reveal" : "tap");
        }
        saveState();
        updateRevealAllButton();
        requestAnimationFrame(() => {
          sizeCard(card);
          (shouldReveal ? card.querySelector(".card-close-button") : card.querySelector(".card-front"))?.focus({ preventScroll: true });
        });
      }

      flipCards.forEach((card) => {
        card.querySelector(".card-front").addEventListener("click", () => toggleCard(card));
        card.querySelector(".card-close-button").addEventListener("click", () => toggleCard(card));
      });

      document.getElementById("reveal-all").addEventListener("click", () => {
        const shouldReveal = state.revealedIds.length !== questions.length;
        state.revealedIds = shouldReveal ? questions.map((question) => question.id) : [];
        if (state.playStyle === "nearby") sendNearbyMessage({ type: "reveal-state", revealedIds: state.revealedIds });
        flipCards.forEach((card) => {
          applyCardState(card, shouldReveal);
        });
        updateRevealAllButton();
        saveState();
        if (shouldReveal) {
          const matches = questions.filter((question) => matchInfoById.get(question.id)?.isMatch).length;
          if (matches) {
            burstConfetti(document.getElementById("reveal-all"), 34);
            playSound("match");
          } else {
            playSound("reveal");
          }
        } else {
          playSound("tap");
        }
        requestAnimationFrame(() => requestAnimationFrame(sizeAllCards));
      });

      document.getElementById("new-round").addEventListener("click", () => {
        const playStyle = state.playStyle;
        if (playStyle === "nearby") {
          if (nearbyRuntime.role === "host") {
            const questionMode = state.questionMode;
            const questionCount = state.questionCount;
            const selectedTopics = [...state.selectedTopics];
            const newIds = chooseRoundQuestions(questionMode, questionCount, selectedTopics);
            if (newIds.length !== questionCount) {
              showToast("Not enough questions to start another round with these settings.");
              return;
            }
            state.selectedQuestionIds = newIds;
            nearbyRuntime.roundStarted = true;
            nearbyRuntime.localComplete = false;
            nearbyRuntime.remotePayload = null;
            const payload = {
              type: "round-init", names: [...state.names], questionMode,
              questionIntensity: state.questionIntensity, selectedTopics,
              selectedQuestionIds: newIds, questions: getSelectedQuestions().filter(Boolean)
            };
            sendNearbyMessage(payload);
            startGame({
              names: state.names, questionMode, questionCount: newIds.length,
              selectedTopics, selectedQuestionIds: newIds, playStyle: "nearby"
            });
            state.activePlayer = 0;
            saveState();
            return;
          } else {
            showToast("Waiting for the host to start the next round...");
            return;
          }
        }

        const settings = persistentSetupState();
        const questionMode = state.questionMode;
        const questionCount = state.questionCount;
        const selectedTopics = [...state.selectedTopics];
        const soundEnabled = state.soundEnabled;
        state = {
          ...initialState(),
          ...settings,
          screen: "question",
          playStyle: "pass-and-play",
          questionMode,
          questionCount,
          selectedTopics,
          soundEnabled,
          selectedQuestionIds: chooseRoundQuestions(questionMode, questionCount, selectedTopics)
        };
        saveState();
        playSound("unlock");
        render();
      });

      document.getElementById("start-over").addEventListener("click", () => {
        closeNearbyConnection();
        state = {
          ...initialState(),
          ...persistentSetupState()
        };
        saveState();
        render();
      });

      requestAnimationFrame(sizeAllCards);

      let cardResizeObserver = null;
      let resizeFrame = 0;
      const scheduleCardResize = () => {
        cancelAnimationFrame(resizeFrame);
        resizeFrame = requestAnimationFrame(sizeAllCards);
      };

      if ("ResizeObserver" in window) {
        cardResizeObserver = new ResizeObserver(scheduleCardResize);
        flipCards.forEach((card) => {
          cardResizeObserver.observe(card.querySelector(".card-front"));
          cardResizeObserver.observe(card.querySelector(".card-back"));
        });
      }
      window.addEventListener("resize", scheduleCardResize, { passive: true });
      window.addEventListener("orientationchange", scheduleCardResize, { passive: true });
      window.visualViewport?.addEventListener("resize", scheduleCardResize, { passive: true });
      cleanupResponsiveRender = () => {
        cancelAnimationFrame(resizeFrame);
        cardResizeObserver?.disconnect();
        window.removeEventListener("resize", scheduleCardResize);
        window.removeEventListener("orientationchange", scheduleCardResize);
        window.visualViewport?.removeEventListener("resize", scheduleCardResize);
      };
    }

    if ("serviceWorker" in navigator && /^https?:$/.test(location.protocol)) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").then((registration) => {
        registration.addEventListener("updatefound", () => {
          const worker = registration.installing;
          worker?.addEventListener("statechange", () => {
            if (worker.state === "installed" && navigator.serviceWorker.controller) showToast("A newer game version is ready. Refresh when your current round is finished.");
          });
        });
      }).catch(() => {}));
    }

    let handledNearbyLaunch = "";

    function handleNearbyJoinLaunch() {
      const launchHashParams = new URLSearchParams(location.hash.slice(1));
      const launchNearbyRoom = launchHashParams.get("join") || "";
      if (!launchNearbyRoom) return false;
      const launchRoomParts = launchNearbyRoom.split(".");
      const launchRoomId = launchRoomParts[0] || "";
      const launchJoinToken = launchRoomParts.slice(1).join(".");
      const hasValidNearbyLaunch = /^[A-Za-z0-9_-]{16,40}$/.test(launchRoomId) && /^[A-Za-z0-9_-]{32,80}$/.test(launchJoinToken);
      if (!hasValidNearbyLaunch) {
        history.replaceState(null, "", location.href.split("#")[0]);
        showToast("That private join link is incomplete. Ask the host to create a fresh QR.");
        return false;
      }
      const launchSignature = `${launchRoomId}.${launchJoinToken}`;
      const alreadyHandling = handledNearbyLaunch === launchSignature
        && nearbyRuntime.roomId === launchRoomId
        && ["joining", "waiting-host", "connecting", "connected"].includes(nearbyRuntime.status);
      if (alreadyHandling) return true;
      handledNearbyLaunch = launchSignature;
      state.playStyle = "nearby";
      state.screen = "nearby";
      saveState();
      history.replaceState(null, "", location.href.split("#")[0]);
      render();
      prepareNearbyJoin(launchRoomId, launchJoinToken);
      return true;
    }

    document.getElementById("ambient-toggle")?.addEventListener("click", () => {
      requestGyroPermission();
      state.ambientMusicEnabled = !state.ambientMusicEnabled;
      saveState();
      playSound("tap");
      applyPreferences();
    });

    document.addEventListener("mousemove", (event) => {
      const card = event.target.closest(".card-face");
      if (!card || state.reducedMotion) return;
      const rect = card.getBoundingClientRect();
      const x = ((event.clientX - rect.left) / rect.width) * 100;
      const y = ((event.clientY - rect.top) / rect.height) * 100;
      card.style.setProperty("--holo-x", `${x}%`);
      card.style.setProperty("--holo-y", `${y}%`);
      card.style.setProperty("--holo-opacity", "0.75");
    }, { passive: true });

    document.addEventListener("mouseout", (event) => {
      const card = event.target.closest(".card-face");
      if (card) {
        card.style.setProperty("--holo-opacity", "0");
      }
    }, { passive: true });

    document.addEventListener("touchmove", (event) => {
      if (!event.touches.length || state.reducedMotion) return;
      const touch = event.touches[0];
      const card = document.elementFromPoint(touch.clientX, touch.clientY)?.closest(".card-face");
      if (!card) return;
      const rect = card.getBoundingClientRect();
      const x = ((touch.clientX - rect.left) / rect.width) * 100;
      const y = ((touch.clientY - rect.top) / rect.height) * 100;
      card.style.setProperty("--holo-x", `${x}%`);
      card.style.setProperty("--holo-y", `${y}%`);
      card.style.setProperty("--holo-opacity", "0.75");
    }, { passive: true });

    document.addEventListener("touchend", () => {
      document.querySelectorAll(".card-face").forEach((card) => {
        card.style.setProperty("--holo-opacity", "0");
      });
    }, { passive: true });

    window.addEventListener("deviceorientation", (event) => {
      if (state.reducedMotion) return;
      const beta = event.beta;
      const gamma = event.gamma;
      if (beta === null || gamma === null) return;
      const x = ((gamma + 45) / 90) * 100;
      const y = ((beta + 45) / 90) * 100;
      document.querySelectorAll(".card-face").forEach((card) => {
        card.style.setProperty("--holo-x", `${x}%`);
        card.style.setProperty("--holo-y", `${y}%`);
        card.style.setProperty("--holo-opacity", "0.45");
      });
    }, { passive: true });

    window.addEventListener("hashchange", handleNearbyJoinLaunch);
    window.addEventListener("pageshow", handleNearbyJoinLaunch);
    if (!handleNearbyJoinLaunch()) render();
  </script>
</body>
</html>
