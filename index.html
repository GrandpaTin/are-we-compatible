  <title>Aligned — Discover How Well You Align</title>
  <style>
    :root {
      color-scheme: dark;
      --midnight: #0f172a;
      --card: #1e293b;
      --card-light: #273449;
      --text: #f8fafc;
      --muted: #94a3b8;
      --coral: #fb7185;
      --coral-dark: #e11d48;
      --blue: #60a5fa;
      --green: #4ade80;
      --violet: #a78bfa;
      --sun: #fbbf24;
      --line: rgba(148, 163, 184, 0.2);
      --shadow: 0 28px 80px rgba(2, 6, 23, 0.46);
      --radius-lg: 28px;
      --radius-md: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--midnight);
    }

    body {
      min-width: 0;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 5%, rgba(251, 113, 133, 0.2), transparent 30rem),
        radial-gradient(circle at 88% 92%, rgba(96, 165, 250, 0.13), transparent 28rem),
        radial-gradient(circle at 82% 15%, rgba(167, 139, 250, 0.1), transparent 22rem),
        var(--midnight);
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -1;
      content: "";
      opacity: 0.22;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, black, transparent 75%);
    }

    body::after {
      position: fixed;
      top: 14%;
      right: -120px;
      z-index: -1;
      width: 260px;
      height: 260px;
      border: 1px solid rgba(251, 113, 133, 0.09);
      border-radius: 50%;
      content: "";
      pointer-events: none;
      box-shadow:
        0 0 0 44px rgba(96, 165, 250, 0.025),
        0 0 0 90px rgba(167, 139, 250, 0.02);
      animation: ambient-drift 12s ease-in-out infinite alternate;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    [hidden] {
      display: none !important;
    }

    .ambient-specks {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .ambient-specks span {
      position: absolute;
      width: var(--speck-size);
      height: var(--speck-size);
      border: 1px solid rgba(248, 250, 252, 0.18);
      border-radius: 35%;
      opacity: 0.45;
      transform: rotate(45deg);
      animation: speck-float var(--speck-speed) ease-in-out infinite alternate;
    }

    .ambient-specks span:nth-child(1) { top: 12%; left: 7%; --speck-size: 9px; --speck-speed: 5s; }
    .ambient-specks span:nth-child(2) { top: 31%; right: 8%; --speck-size: 6px; --speck-speed: 7s; }
    .ambient-specks span:nth-child(3) { bottom: 17%; left: 9%; --speck-size: 7px; --speck-speed: 6s; }
    .ambient-specks span:nth-child(4) { bottom: 30%; right: 13%; --speck-size: 11px; --speck-speed: 8s; }
    .ambient-specks span:nth-child(5) { top: 56%; left: 3%; --speck-size: 5px; --speck-speed: 5.5s; }
    .ambient-specks span:nth-child(6) { top: 8%; right: 29%; --speck-size: 6px; --speck-speed: 6.5s; }

    .aurora-canvas {
      position: fixed;
      inset: 0;
      z-index: -2;
      overflow: hidden;
      pointer-events: none;
      filter: saturate(1.15);
    }

    .aurora-blob {
      position: absolute;
      width: min(52vw, 620px);
      aspect-ratio: 1;
      border-radius: 42% 58% 65% 35% / 45% 36% 64% 55%;
      opacity: 0.12;
      filter: blur(70px);
      mix-blend-mode: screen;
      animation: aurora-morph 18s ease-in-out infinite alternate;
    }

    .aurora-blob.one {
      top: -18%;
      left: -16%;
      background: linear-gradient(135deg, var(--coral), var(--violet));
    }

    .aurora-blob.two {
      right: -20%;
      bottom: -24%;
      background: linear-gradient(135deg, var(--blue), var(--green));
      animation-delay: -7s;
      animation-direction: alternate-reverse;
    }

    .aurora-blob.three {
      top: 38%;
      left: 42%;
      width: min(34vw, 400px);
      background: linear-gradient(135deg, var(--violet), var(--blue));
      opacity: 0.07;
      animation-delay: -12s;
    }

    .app-shell {
      width: min(100% - 24px, 780px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: max(20px, env(safe-area-inset-top)) 0 max(24px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      align-self: flex-start;
      gap: 10px;
      margin-bottom: 20px;
      padding: 6px 10px 6px 6px;
      border: 1px solid rgba(148, 163, 184, 0.13);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.45);
      box-shadow: 0 12px 34px rgba(2, 6, 23, 0.18);
      backdrop-filter: blur(14px);
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .topbar .brand {
      margin-bottom: 0;
    }

    .home-btn {
      display: inline-flex;
      min-height: 46px;
      padding: 0 15px;
      border: 1px solid rgba(148, 163, 184, 0.17);
      border-radius: 14px;
      align-items: center;
      gap: 8px;
      color: #e2e8f0;
      background: rgba(15, 23, 42, 0.55);
      box-shadow: 0 12px 34px rgba(2, 6, 23, 0.18);
      backdrop-filter: blur(14px);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 820;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .home-btn:hover {
      border-color: rgba(251, 113, 133, 0.36);
      background: rgba(251, 113, 133, 0.09);
      transform: translateY(-2px);
    }

    .home-icon {
      display: grid;
      width: 25px;
      height: 25px;
      place-items: center;
      border-radius: 8px;
      color: var(--coral);
      background: rgba(251, 113, 133, 0.1);
      font-size: 0.9rem;
    }

    .brand-mark {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid rgba(251, 113, 133, 0.36);
      border-radius: 11px;
      color: var(--coral);
      background: rgba(251, 113, 133, 0.1);
      box-shadow: 0 8px 30px rgba(251, 113, 133, 0.12);
      font-size: 1.2rem;
    }

    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .screen {
      width: 100%;
      margin: auto 0;
      animation: enter 420ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--coral);
      font-size: 0.76rem;
      font-weight: 850;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1,
    h2,
    p {
      overflow-wrap: break-word;
    }

    h1 {
      width: fit-content;
      max-width: min(100%, 680px);
      margin: -0.06em -0.1em -0.1em -0.02em;
      padding: 0.06em 0.1em 0.1em 0.02em;
      overflow: visible;
      font-size: clamp(2.2rem, 7vw, 3.8rem);
      line-height: 1.01;
      letter-spacing: -0.065em;
      word-break: normal;
    }

    h2 {
      margin: 0;
      font-size: clamp(1.4rem, 4vw, 2.1rem);
      line-height: 1.12;
      letter-spacing: -0.035em;
    }

    .lede {
      max-width: 600px;
      margin: 12px 0 0;
      color: #cbd5e1;
      font-size: clamp(0.92rem, 2.2vw, 1.05rem);
      line-height: 1.6;
    }

    .accent-text {
      color: var(--coral);
    }

    .setup-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px;
      align-items: center;
      gap: clamp(12px, 4vw, 32px);
    }

    .love-orbit {
      position: relative;
      width: 170px;
      height: 170px;
      margin: 0 auto;
      isolation: isolate;
      transform: scale(0.82);
      transform-origin: center;
      animation: float-scene 5.5s ease-in-out infinite;
    }

    .orbit-ring {
      position: absolute;
      inset: 22px;
      border: 1px solid rgba(251, 113, 133, 0.28);
      border-radius: 50%;
      box-shadow:
        0 0 0 18px rgba(251, 113, 133, 0.025),
        inset 0 0 35px rgba(167, 139, 250, 0.05);
      transform: rotate(-18deg);
    }

    .orbit-ring::before,
    .orbit-ring::after {
      position: absolute;
      border-radius: 50%;
      content: "";
    }

    .orbit-ring::before {
      top: 8px;
      right: 24px;
      width: 10px;
      height: 10px;
      background: var(--sun);
      box-shadow: 0 0 18px rgba(251, 191, 36, 0.55);
    }

    .orbit-ring::after {
      bottom: 14px;
      left: 14px;
      width: 7px;
      height: 7px;
      background: var(--violet);
      box-shadow: 0 0 18px rgba(167, 139, 250, 0.55);
    }

    .orbit-heart {
      position: absolute;
      top: 50%;
      left: 50%;
      display: grid;
      width: 76px;
      height: 76px;
      place-items: center;
      border: 1px solid rgba(251, 113, 133, 0.38);
      border-radius: 26px;
      color: var(--coral);
      background: linear-gradient(145deg, rgba(251, 113, 133, 0.18), rgba(167, 139, 250, 0.08));
      box-shadow: 0 18px 50px rgba(251, 113, 133, 0.2);
      font-size: 2.15rem;
      transform: translate(-50%, -50%) rotate(8deg);
      animation: heart-beat 2.4s ease-in-out infinite;
    }

    .orbit-person {
      position: absolute;
      z-index: 2;
      display: grid;
      width: 45px;
      height: 45px;
      place-items: center;
      border: 4px solid #e2e8f0;
      border-radius: 50%;
      color: #0f172a;
      font-size: 0.77rem;
      font-weight: 950;
      box-shadow: 0 10px 25px rgba(2, 6, 23, 0.38);
    }

    .orbit-person::after {
      position: absolute;
      bottom: 8px;
      width: 14px;
      height: 6px;
      border-bottom: 2px solid rgba(15, 23, 42, 0.62);
      border-radius: 50%;
      content: "";
    }

    .orbit-person.one {
      top: 19px;
      left: 17px;
      background: var(--blue);
      animation: person-one 6s ease-in-out infinite;
    }

    .orbit-person.two {
      right: 16px;
      bottom: 20px;
      background: var(--green);
      animation: person-two 6s ease-in-out infinite;
    }

    .setup-card,
    .question-card,
    .lock-card {
      margin-top: 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(30, 41, 59, 0.9);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .setup-card {
      padding: clamp(16px, 4vw, 26px);
      background:
        linear-gradient(145deg, rgba(39, 52, 73, 0.94), rgba(30, 41, 59, 0.9));
    }

    .setup-section-title {
      margin: 20px 0 10px;
      color: #e2e8f0;
      font-size: 0.76rem;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .mode-picker {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .mode-option {
      position: relative;
      display: block;
      min-height: 84px;
      cursor: pointer;
    }

    .mode-option input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .mode-card {
      display: flex;
      height: 100%;
      padding: 11px;
      border: 1px solid rgba(148, 163, 184, 0.17);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.47);
      flex-direction: column;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .mode-option:hover .mode-card {
      border-color: rgba(251, 113, 133, 0.38);
      transform: translateY(-2px);
    }

    .mode-option input:checked + .mode-card {
      border-color: var(--coral);
      background: linear-gradient(145deg, rgba(251, 113, 133, 0.15), rgba(167, 139, 250, 0.08));
      box-shadow: 0 0 0 3px rgba(251, 113, 133, 0.09);
    }

    .mode-option input:focus-visible + .mode-card {
      box-shadow: 0 0 0 4px rgba(251, 113, 133, 0.2);
    }

    .mode-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--text);
      font-size: 0.84rem;
      font-weight: 850;
    }

    .mode-icon {
      display: grid;
      width: 27px;
      height: 27px;
      place-items: center;
      border-radius: 9px;
      color: var(--coral);
      background: rgba(251, 113, 133, 0.1);
    }

    .mode-description {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 620;
      line-height: 1.35;
    }

    .setup-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-top: 28px;
    }

    .setup-title-row .setup-section-title {
      margin: 0;
    }

    .count-picker {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .count-option {
      position: relative;
      cursor: pointer;
    }

    .count-option input,
    .topic-option input,
    .sound-setting input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .count-card {
      display: flex;
      min-height: 68px;
      padding: 12px 15px;
      border: 1px solid rgba(148, 163, 184, 0.17);
      border-radius: 15px;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(15, 23, 42, 0.47);
      transition: transform 170ms ease, border-color 170ms ease, background 170ms ease;
    }

    .count-number {
      color: var(--text);
      font-size: 1.35rem;
      font-weight: 920;
    }

    .count-time {
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 700;
      line-height: 1.25;
    }

    .count-option:hover .count-card {
      border-color: rgba(251, 113, 133, 0.38);
      transform: translateY(-2px);
    }

    .count-option input:checked + .count-card {
      border-color: var(--coral);
      background: rgba(251, 113, 133, 0.11);
      box-shadow: 0 0 0 3px rgba(251, 113, 133, 0.08);
    }

    .topic-toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }

    .mini-action {
      min-height: 30px;
      padding: 0 9px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 9px;
      color: var(--muted);
      background: rgba(15, 23, 42, 0.4);
      cursor: pointer;
      font-size: 0.66rem;
      font-weight: 760;
    }

    .mini-action:hover {
      color: var(--text);
      border-color: rgba(251, 113, 133, 0.35);
    }

    .topic-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 12px;
    }

    .topic-option {
      position: relative;
      cursor: pointer;
    }

    .topic-chip {
      display: inline-flex;
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid rgba(148, 163, 184, 0.17);
      border-radius: 11px;
      align-items: center;
      gap: 7px;
      color: #cbd5e1;
      background: rgba(15, 23, 42, 0.47);
      font-size: 0.72rem;
      font-weight: 790;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .topic-icon {
      display: grid;
      width: 19px;
      height: 19px;
      place-items: center;
      border-radius: 6px;
      color: var(--topic-color);
      background: color-mix(in srgb, var(--topic-color) 12%, transparent);
      font-size: 0.7rem;
      font-weight: 900;
    }

    .topic-option:hover .topic-chip {
      border-color: color-mix(in srgb, var(--topic-color) 48%, transparent);
      transform: translateY(-2px);
    }

    .topic-option input:checked + .topic-chip {
      border-color: color-mix(in srgb, var(--topic-color) 70%, transparent);
      color: var(--text);
      background: color-mix(in srgb, var(--topic-color) 13%, rgba(15, 23, 42, 0.7));
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--topic-color) 7%, transparent);
    }

    .topic-option input:focus-visible + .topic-chip,
    .count-option input:focus-visible + .count-card {
      box-shadow: 0 0 0 4px rgba(251, 113, 133, 0.2);
    }

    .topic-note {
      margin: 11px 0 0;
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.45;
    }

    .sound-setting {
      position: relative;
      display: flex;
      margin-top: 24px;
      padding: 14px 16px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 15px;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      color: #e2e8f0;
      background: rgba(15, 23, 42, 0.38);
      cursor: pointer;
    }

    .sound-copy {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      font-weight: 800;
    }

    .sound-copy small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.67rem;
      font-weight: 620;
    }

    .toggle-track {
      position: relative;
      flex: 0 0 auto;
      width: 48px;
      height: 28px;
      border-radius: 999px;
      background: #475569;
      transition: background 170ms ease;
    }

    .toggle-track::after {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      content: "";
      background: var(--text);
      box-shadow: 0 3px 8px rgba(2, 6, 23, 0.35);
      transition: transform 170ms ease;
    }

    .sound-setting input:checked ~ .toggle-track {
      background: var(--coral);
    }

    .sound-setting input:checked ~ .toggle-track::after {
      transform: translateX(20px);
    }

    .sound-setting input:focus-visible ~ .toggle-track {
      box-shadow: 0 0 0 4px rgba(251, 113, 133, 0.18);
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      color: #cbd5e1;
      font-size: 0.78rem;
      font-weight: 760;
    }

    .name-input,
    .answer-textarea {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.25);
      outline: none;
      color: var(--text);
      background: rgba(15, 23, 42, 0.72);
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .name-input {
      height: 44px;
      margin-top: 6px;
      padding: 0 14px;
      border-radius: 12px;
    }

    .answer-textarea {
      min-height: 120px;
      margin-top: 10px;
      padding: 12px 14px;
      resize: vertical;
      border-radius: 14px;
      line-height: 1.5;
    }

    .name-input:focus,
    .answer-textarea:focus {
      border-color: var(--coral);
      background: rgba(15, 23, 42, 0.94);
      box-shadow: 0 0 0 4px rgba(251, 113, 133, 0.12);
    }

    .name-input::placeholder,
    .answer-textarea::placeholder {
      color: #64748b;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;

        #475569 100%

      background: var(--blue);
      box-shadow: 0 0 18px rgba(96, 165, 250, 0.5);

      box-shadow: 0 0 18px rgba(74, 222, 128, 0.45);

    }

    .topic-alignment-name {
      margin-top: 8px;
      color: #cbd5e1;
      font-size: 0.65rem;
      font-weight: 760;
      line-height: 1.2;
    }

    .alignment-legend {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 13px;
      color: var(--muted);
      font-size: 0.62rem;
      font-weight: 700;
    }

    .heat-gradient {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, #fb7185, #fbbf24, #4ade80);
    }

    .reveal-grid {
      display: grid;
      gap: 12px;
    }

    @media (min-width: 600px) {
      .reveal-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    .flip-card {
      position: relative;
      display: block;
      width: 100%;
      min-height: 170px;
      padding: 0;
      border: 0;
      outline: none;
      color: inherit;
      background: transparent;
      perspective: 1400px;
      text-align: left;
      transition: height 320ms cubic-bezier(0.22, 1, 0.36, 1), transform 180ms ease;
    }

    .flip-card:hover {
      transform: translateY(-2px);
    }

    .card-front:focus-visible,
    .card-close-button:focus-visible {
      outline: none;
      border-radius: var(--radius-md);
      box-shadow: 0 0 0 4px rgba(251, 113, 133, 0.25);
    }

    .flip-card-inner {
      position: relative;
      display: block;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 620ms cubic-bezier(0.2, 0.72, 0.2, 1);
    }

    .flip-card.flipped .flip-card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      top: 0;
      right: 0;
      left: 0;
      width: 100%;
      min-height: 170px;
      padding: clamp(14px, 4vw, 22px);
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background:
        radial-gradient(circle at 92% 12%, rgba(251, 113, 133, 0.12), transparent 10rem),
        linear-gradient(145deg, #253349, var(--card));
      box-shadow: 0 14px 34px rgba(2, 6, 23, 0.24);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-face::before {
      position: absolute;
      inset: 0;
      z-index: 2;
      content: "";
      pointer-events: none;
      opacity: var(--holo-opacity, 0);
      background: linear-gradient(
        115deg,
        transparent 15%,
        rgba(255, 255, 255, 0.25) 25%,
        rgba(96, 165, 250, 0.35) 35%,
        rgba(251, 113, 133, 0.35) 45%,
        rgba(167, 139, 250, 0.35) 55%,
        rgba(251, 191, 36, 0.35) 65%,
        rgba(255, 255, 255, 0.25) 75%,
        transparent 85%
      );
      background-size: 250% 250%;
      background-position: var(--holo-x, 50%) var(--holo-y, 50%);
      mix-blend-mode: color-dodge;
      transition: opacity 250ms ease;
    }

    .card-front {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 170px;
      color: var(--text);
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .flip-card:nth-child(5n + 2) .card-front {
      background:
        radial-gradient(circle at 92% 12%, rgba(96, 165, 250, 0.15), transparent 10rem),
        linear-gradient(145deg, #26364e, var(--card));
    }

    .flip-card:nth-child(5n + 3) .card-front {
      background:
        radial-gradient(circle at 92% 12%, rgba(167, 139, 250, 0.15), transparent 10rem),
        linear-gradient(145deg, #2a334d, var(--card));
    }

    .flip-card:nth-child(5n + 4) .card-front {
      background:
        radial-gradient(circle at 92% 12%, rgba(74, 222, 128, 0.11), transparent 10rem),
        linear-gradient(145deg, #23394a, var(--card));
    }

    .flip-card:nth-child(5n + 5) .card-front {
      background:
        radial-gradient(circle at 92% 12%, rgba(251, 191, 36, 0.12), transparent 10rem),
        linear-gradient(145deg, #303547, var(--card));
    }

    .card-front::after {
      position: absolute;
      right: -55px;
      bottom: -75px;
      width: 180px;
      height: 180px;
      border: 34px solid rgba(251, 113, 133, 0.06);
      border-radius: 50%;
      content: "";
    }

    .card-back {
      height: max-content;
      transform: rotateY(180deg);
      background: linear-gradient(145deg, #253349, var(--card));
    }

    .card-number {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 820;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .card-question {
      display: block;
      position: relative;
      z-index: 1;
      max-width: 610px;
      margin: 10px 0 14px;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 790;
      line-height: 1.4;
      letter-spacing: -0.018em;
    }

    .tap-hint {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--coral);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .tap-hint::before {
      content: "↻";
      font-size: 1rem;
    }

    .card-close-button {
      width: max-content;
      margin-top: 22px;
      padding: 8px 0;
      border: 0;
      color: var(--coral);
      background: transparent;
      font: inherit;
      cursor: pointer;
    }

    .card-spark {
      display: inline-grid;
      width: 23px;
      height: 23px;
      place-items: center;
      border-radius: 8px;
      color: var(--coral);
      background: rgba(251, 113, 133, 0.11);
      font-size: 0.75rem;
    }

    .card-pair {
      position: absolute;
      right: 27px;
      bottom: 25px;
      z-index: 1;
      display: flex;
      width: 67px;
      align-items: center;
      justify-content: space-between;
      opacity: 0.78;
    }

    .card-pair::before {
      position: absolute;
      right: 14px;
      left: 14px;
      height: 2px;
      content: "";
      background: linear-gradient(90deg, var(--blue), var(--coral), var(--green));
    }

    .card-pair span {
      position: relative;
      z-index: 1;
      width: 18px;
      height: 18px;
      border: 3px solid #e2e8f0;
      border-radius: 50%;
      box-shadow: 0 5px 12px rgba(2, 6, 23, 0.35);
    }

    .card-pair span:first-child {
      background: var(--blue);
    }

    .card-pair span:last-child {
      background: var(--green);
    }

    .answer-stack {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .answer-box {
      padding: 15px 16px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-left: 4px solid var(--player-color);
      border-radius: 5px 14px 14px 5px;
      background: rgba(15, 23, 42, 0.55);
    }

    .answer-name {
      display: block;
      margin-bottom: 5px;
      color: var(--player-color);
      font-size: 0.75rem;
      font-weight: 850;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .answer-copy {
      margin: 0;
      color: #e2e8f0;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .comparison-wrap {
      margin-top: 23px;
      padding: 22px 15px 15px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.5);
    }

    .comparison-scale {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      margin-bottom: 29px;
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 680;
      line-height: 1.25;
    }

    .comparison-scale span:last-child {
      text-align: right;
    }

    .comparison-track {
      position: relative;
      height: 8px;
      margin: 0 13px 24px;
      border-radius: 999px;
      background: #475569;
      box-shadow: inset 0 2px 3px rgba(2, 6, 23, 0.35);
    }

    .comparison-gap {
      position: absolute;
      top: 2px;
      left: min(var(--p1-pos), var(--p2-pos));
      width: max(3px, calc(max(var(--p1-pos), var(--p2-pos)) - min(var(--p1-pos), var(--p2-pos))));
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--green));
    }

    .marker {
      position: absolute;
      top: 50%;
      left: var(--marker-pos);
      width: 21px;
      height: 21px;
      border: 3px solid var(--text);
      border-radius: 50%;
      background: var(--marker-color);
      box-shadow: 0 4px 12px rgba(2, 6, 23, 0.52);
      transform: translate(-50%, calc(-50% + var(--marker-offset)));
    }

    .marker-value {
      position: absolute;
      left: 50%;
      padding: 2px 6px;
      border-radius: 7px;
      color: #0f172a;
      background: var(--marker-color);
      font-size: 0.68rem;
      font-weight: 900;
      line-height: 1.2;
      transform: translateX(-50%);
    }

    .marker-one .marker-value {
      bottom: 23px;
    }

    .marker-two .marker-value {
      top: 23px;
    }

    .comparison-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      padding-top: 7px;
      color: #cbd5e1;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .difference-panel {
      margin-top: 18px;
      padding: 13px 14px;
      border: 1px solid color-mix(in srgb, var(--match-color) 28%, transparent);
      border-radius: 13px;
      background: color-mix(in srgb, var(--match-color) 7%, rgba(15, 23, 42, 0.55));
    }

    .difference-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 9px;
      color: #e2e8f0;
      font-size: 0.74rem;
      font-weight: 820;
    }

    .difference-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--match-color);
    }

    .difference-score {
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 700;
    }

    .difference-track {
      position: relative;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--match-color) 55%, #ffffff), var(--match-color));
    }

    .difference-mask {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: calc(100% - var(--match-percent));
      background: #334155;
      transition: width 650ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .match-badge {
      display: inline-flex;
      min-height: 34px;
      margin-bottom: 14px;
      padding: 0 12px;
      border: 1px solid rgba(251, 191, 36, 0.42);
      border-radius: 999px;
      align-items: center;
      gap: 7px;
      color: #fef3c7;
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.18), rgba(251, 113, 133, 0.12));
      box-shadow: 0 8px 24px rgba(251, 191, 36, 0.12);
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      animation: match-glow 1.8s ease-in-out infinite;
    }

    .match-star {
      color: var(--sun);
      font-size: 1rem;
    }

    .card-back.match-card {
      border-color: rgba(251, 191, 36, 0.42);
      background:
        radial-gradient(circle at 92% 10%, rgba(251, 191, 36, 0.17), transparent 12rem),
        linear-gradient(145deg, #2b374b, var(--card));
      box-shadow: 0 18px 46px rgba(251, 191, 36, 0.12), 0 14px 34px rgba(2, 6, 23, 0.24);
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .legend-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--dot-color);
    }

    .reveal-actions {
      justify-content: center;
      margin: 28px 0 4px;
    }

    .footer-note {
      margin: 30px 0 0;
      color: #64748b;
      font-size: 0.76rem;
      text-align: center;
    }

    .reveal-all-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border-color: rgba(251, 113, 133, 0.28);
      background: rgba(251, 113, 133, 0.08);
    }

    .reveal-all-btn:hover {
      border-color: rgba(251, 113, 133, 0.48);
      background: rgba(251, 113, 133, 0.14);
    }

    .reveal-buddies {
      display: inline-flex;
      align-items: center;
      margin-bottom: 13px;
    }

    .reveal-buddy {
      display: grid;
      width: 30px;
      height: 30px;
      place-items: center;
      border: 3px solid var(--midnight);
      border-radius: 50%;
      color: #0f172a;
      font-size: 0.63rem;
      font-weight: 950;
    }

    .reveal-buddy + .reveal-buddy {
      margin-left: -8px;
    }

    .reveal-buddy.one {
      background: var(--blue);
    }

    .reveal-buddy.two {
      background: var(--green);
    }

    .celebration-spark {
      position: fixed;
      top: 45%;
      left: 50%;
      z-index: 100;
      width: 9px;
      height: 9px;
      border-radius: 3px;
      pointer-events: none;
      background: var(--spark-color);
      animation: sparkle-burst 900ms cubic-bezier(0.1, 0.7, 0.2, 1) forwards;
    }

    .library-launch {
      display: flex;
      width: 100%;
      min-height: 62px;
      margin-top: 18px;
      padding: 12px 15px;
      border: 1px solid rgba(167, 139, 250, 0.22);
      border-radius: 16px;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      color: var(--text);
      background: linear-gradient(135deg, rgba(167, 139, 250, 0.1), rgba(96, 165, 250, 0.06));
      cursor: pointer;
      text-align: left;
      transition: transform 170ms ease, border-color 170ms ease, background 170ms ease;
    }

    .library-launch:hover {
      border-color: rgba(167, 139, 250, 0.45);
      background: linear-gradient(135deg, rgba(167, 139, 250, 0.16), rgba(96, 165, 250, 0.09));
      transform: translateY(-2px);
    }

    .library-launch-copy {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.82rem;
      font-weight: 850;
    }

    .library-launch-icon {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border-radius: 12px;
      color: var(--violet);
      background: rgba(167, 139, 250, 0.12);
      font-size: 1.05rem;
    }

    .library-launch-count {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 720;
    }

    .data-management {
      margin-top: 18px;
      padding: 15px;
      border: 1px solid rgba(148, 163, 184, 0.13);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.32);
    }

    .data-management-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 11px;
      color: #cbd5e1;
      font-size: 0.72rem;
      font-weight: 850;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .data-management-title span:last-child {
      color: var(--muted);
      font-size: 0.62rem;
      font-weight: 650;
      letter-spacing: 0;
      text-transform: none;
    }

    .data-tools {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .data-tool {
      display: flex;
      min-height: 45px;
      padding: 0 10px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 12px;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: #cbd5e1;
      background: rgba(30, 41, 59, 0.62);
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 800;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .data-tool:hover {
      border-color: rgba(96, 165, 250, 0.36);
      color: var(--text);
      background: rgba(96, 165, 250, 0.08);
      transform: translateY(-2px);
    }

    .data-tool.danger:hover {
      border-color: rgba(251, 113, 133, 0.42);
      background: rgba(251, 113, 133, 0.09);
    }

    .data-status {
      min-height: 18px;
      margin: 9px 0 -3px;
      color: var(--green);
      font-size: 0.68rem;
      font-weight: 720;
    }

    .app-toast {
      position: fixed;
      right: 18px;
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 300;
      max-width: min(360px, calc(100% - 36px));
      padding: 13px 16px;
      border: 1px solid rgba(74, 222, 128, 0.28);
      border-radius: 13px;
      color: #dcfce7;
      background: rgba(20, 83, 45, 0.94);
      box-shadow: 0 18px 45px rgba(2, 6, 23, 0.42);
      backdrop-filter: blur(12px);
      font-size: 0.76rem;
      font-weight: 760;
      animation: modal-rise 220ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .library-screen {
      margin: 0;
    }

    .library-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 24px;
    }

    .library-overall {
      flex: 0 0 auto;
      min-width: 150px;
      padding: 14px 16px;
      border: 1px solid rgba(74, 222, 128, 0.2);
      border-radius: 16px;
      background: rgba(74, 222, 128, 0.06);
    }

    .library-overall strong {
      display: block;
      color: var(--green);
      font-size: 1.4rem;
      letter-spacing: -0.04em;
    }

    .library-overall span {
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 720;
    }

    .topic-progress-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .topic-progress-card {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 14px;
      background: rgba(30, 41, 59, 0.68);
      cursor: pointer;
      text-align: left;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .topic-progress-card:hover,
    .topic-progress-card.active {
      border-color: color-mix(in srgb, var(--topic-color) 48%, transparent);
      background: color-mix(in srgb, var(--topic-color) 8%, rgba(30, 41, 59, 0.72));
      transform: translateY(-2px);
    }

    .topic-progress-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #cbd5e1;
      font-size: 0.7rem;
      font-weight: 780;
    }

    .topic-progress-top strong {
      color: var(--topic-color);
      font-size: 0.75rem;
    }

    .topic-progress-track {
      display: block;
      height: 5px;
      margin-top: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.12);
    }

    .topic-progress-fill {
      display: block;
      height: 100%;
      width: var(--topic-progress);
      border-radius: inherit;
      background: var(--topic-color);
    }

    .library-add {
      margin-bottom: 18px;
      border: 1px solid rgba(251, 113, 133, 0.2);
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(39, 52, 73, 0.82), rgba(30, 41, 59, 0.72));
    }

    .library-add > summary {
      display: flex;
      min-height: 58px;
      padding: 0 18px;
      align-items: center;
      gap: 10px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 850;
      list-style: none;
    }

    .library-add > summary::-webkit-details-marker { display: none; }

    .library-add > summary::before {
      display: grid;
      width: 28px;
      height: 28px;
      place-items: center;
      border-radius: 9px;
      content: "+";
      color: var(--coral);
      background: rgba(251, 113, 133, 0.1);
      font-size: 1.05rem;
    }

    .library-add[open] > summary::before { content: "−"; }

    .custom-form {
      padding: 0 18px 18px;
    }

    .custom-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .custom-label {
      color: #cbd5e1;
      font-size: 0.72rem;
      font-weight: 780;
    }

    .custom-select,
    .custom-input,
    .library-search {
      width: 100%;
      min-height: 38px;
      margin-top: 5px;
      padding: 0 10px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 10px;
      outline: none;
      color: var(--text);
      background: rgba(15, 23, 42, 0.72);
      font-size: 0.76rem;
    }

    .custom-select:focus,
    .custom-input:focus,
    .library-search:focus {
      border-color: var(--coral);
      box-shadow: 0 0 0 3px rgba(251, 113, 133, 0.1);
    }

    .custom-prompt {
      min-height: 95px;
      margin-top: 7px;
    }

    .custom-full {
      grid-column: 1 / -1;
    }

    .library-controls {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      gap: 12px;
      margin-bottom: 12px;
    }

    .library-search {
      margin-top: 0;
    }

    .library-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .library-filter {
      min-height: 45px;
      padding: 0 12px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 12px;
      color: var(--muted);
      background: rgba(15, 23, 42, 0.5);
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 780;
    }

    .library-filter.active {
      border-color: var(--violet);
      color: var(--text);
      background: rgba(167, 139, 250, 0.12);
    }

    .question-library-list {
      display: grid;
      max-height: 68vh;
      gap: 9px;
      padding: 3px 5px 3px 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-color: rgba(167, 139, 250, 0.45) rgba(15, 23, 42, 0.3);
    }

    .library-question {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      padding: 15px;
      border: 1px solid rgba(148, 163, 184, 0.13);
      border-radius: 15px;
      align-items: start;
      background: rgba(30, 41, 59, 0.72);
      transition: border-color 160ms ease, background 160ms ease;
    }

    .library-question.answered {
      border-color: rgba(74, 222, 128, 0.22);
      background: linear-gradient(135deg, rgba(74, 222, 128, 0.055), rgba(30, 41, 59, 0.72));
    }

    .library-question.excluded {
      opacity: 0.62;
      border-style: dashed;
    }

    .question-status {
      display: grid;
      width: 30px;
      height: 30px;
      place-items: center;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 10px;
      color: #64748b;
      background: rgba(15, 23, 42, 0.5);
      font-weight: 900;
    }

    .answered .question-status {
      border-color: rgba(74, 222, 128, 0.35);
      color: #052e16;
      background: var(--green);
    }

    .library-question-copy strong {
      display: block;
      color: #e2e8f0;
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .library-question-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 0.65rem;
      font-weight: 720;
    }

    .library-question-meta span {
      padding: 3px 7px;
      border-radius: 7px;
      background: rgba(148, 163, 184, 0.08);
    }

    .library-answer-history {
      margin-top: 10px;
      border: 1px solid rgba(96, 165, 250, 0.14);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.38);
    }

    .library-answer-history summary {
      padding: 9px 11px;
      color: #bfdbfe;
      cursor: pointer;
      font-size: 0.68rem;
      font-weight: 790;
      list-style-position: inside;
    }

    .saved-round-list {
      display: grid;
      max-height: 330px;
      gap: 8px;
      padding: 0 9px 9px;
      overflow-y: auto;
    }

    .saved-round {
      padding: 10px;
      border: 1px solid rgba(148, 163, 184, 0.11);
      border-radius: 10px;
      background: rgba(30, 41, 59, 0.64);
    }

    .saved-round-date {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.59rem;
      font-weight: 720;
    }

    .saved-answer-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .saved-answer {
      min-width: 0;
      padding: 8px 9px;
      border-left: 3px solid var(--saved-player-color);
      border-radius: 7px;
      background: rgba(15, 23, 42, 0.5);
    }

    .saved-answer-name {
      display: block;
      overflow: hidden;
      color: var(--saved-player-color);
      font-size: 0.59rem;
      font-weight: 850;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .saved-answer-value,
    .saved-answer-comment {
      display: block;
      margin-top: 4px;
      overflow-wrap: anywhere;
      color: #e2e8f0;
      font-size: 0.67rem;
      font-weight: 600;
      line-height: 1.4;
    }

    .saved-answer-comment {
      color: var(--muted);
      font-size: 0.61rem;
      font-style: italic;
    }

    .question-library-actions {
      display: flex;
      gap: 6px;
    }

    .question-library-action {
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 10px;
      color: var(--muted);
      background: rgba(15, 23, 42, 0.46);
      cursor: pointer;
      font-size: 0.66rem;
      font-weight: 760;
    }

    .question-library-action:hover {
      border-color: rgba(251, 113, 133, 0.36);
      color: var(--text);
    }

    .library-empty {
      padding: 36px 20px;
      border: 1px dashed rgba(148, 163, 184, 0.18);
      border-radius: 16px;
      color: var(--muted);
      text-align: center;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: grid;
      padding: 20px;
      place-items: center;
      background: rgba(2, 6, 23, 0.72);
      backdrop-filter: blur(12px);
      animation: modal-fade 180ms ease both;
    }

    .exit-dialog {
      position: relative;
      width: min(100%, 430px);
      padding: 30px;
      overflow: hidden;
      border: 1px solid rgba(251, 113, 133, 0.25);
      border-radius: 26px;
      background:
        radial-gradient(circle at 100% 0, rgba(251, 113, 133, 0.16), transparent 13rem),
        linear-gradient(145deg, #273449, #1e293b);
      box-shadow: 0 32px 90px rgba(2, 6, 23, 0.58);
      animation: modal-rise 240ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .dialog-graphic {
      position: relative;
      display: grid;
      width: 64px;
      height: 64px;
      margin-bottom: 20px;
      place-items: center;
      border: 1px solid rgba(251, 113, 133, 0.3);
      border-radius: 21px;
      color: var(--coral);
      background: rgba(251, 113, 133, 0.1);
      font-size: 1.8rem;
    }

    .dialog-graphic::after {
      position: absolute;
      top: -7px;
      right: -7px;
      width: 15px;
      height: 15px;
      border: 3px solid var(--card-light);
      border-radius: 50%;
      content: "";
      background: var(--green);
    }

    .dialog-copy {
      margin: 11px 0 0;
      color: #cbd5e1;
      line-height: 1.6;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }

    /* Premium responsive polish layer */
    :root {
      --midnight-deep: #08111f;
      --glass: rgba(30, 41, 59, 0.76);
      --glass-strong: rgba(30, 41, 59, 0.94);
      --hairline: rgba(226, 232, 240, 0.12);
      --soft-glow: 0 24px 70px rgba(2, 6, 23, 0.38);
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }

    html {
      scroll-behavior: smooth;
      scrollbar-color: rgba(251, 113, 133, 0.5) rgba(15, 23, 42, 0.4);
      text-size-adjust: 100%;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background:
        radial-gradient(ellipse at 12% -5%, rgba(251, 113, 133, 0.26), transparent 34rem),
        radial-gradient(ellipse at 105% 25%, rgba(167, 139, 250, 0.18), transparent 36rem),
        radial-gradient(ellipse at 45% 110%, rgba(96, 165, 250, 0.15), transparent 34rem),
        linear-gradient(155deg, var(--midnight-deep), var(--midnight) 45%, #111c31);
      background-attachment: fixed;
    }

    button,
    input,
    textarea,
    select,
    summary,
    label {
      -webkit-tap-highlight-color: transparent;
    }

    button,
    summary,
    label,
    input[type="range"] {
      touch-action: manipulation;
    }

    button,
    .count-option,
    .mode-option,
    .topic-option,
    summary {
      user-select: none;
      -webkit-user-select: none;
    }

    button:focus-visible,
    summary:focus-visible,
    select:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 3px solid rgba(251, 113, 133, 0.42);
      outline-offset: 3px;
    }

    .app-shell {
      width: min(calc(100% - clamp(24px, 5vw, 64px)), 980px);
      padding-top: max(20px, env(safe-area-inset-top));
      padding-right: env(safe-area-inset-right);
      padding-bottom: max(30px, env(safe-area-inset-bottom));
      padding-left: env(safe-area-inset-left);
    }

    .topbar {
      position: sticky;
      top: max(8px, env(safe-area-inset-top));
      z-index: 90;
      margin: -8px -8px 30px;
      padding: 8px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(8, 17, 31, 0.9), rgba(8, 17, 31, 0.58));
      backdrop-filter: blur(18px) saturate(1.35);
      -webkit-backdrop-filter: blur(18px) saturate(1.35);
    }

    .topbar:has(.home-btn[hidden]) {
      position: relative;
      top: auto;
      width: max-content;
      margin-right: 0;
      margin-left: 0;
      padding: 0;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .topbar:has(.home-btn[hidden]) .brand > span:last-child {
      display: inline;
    }

    .brand,
    .home-btn {
      border-color: rgba(226, 232, 240, 0.13);
      background: linear-gradient(145deg, rgba(39, 52, 73, 0.82), rgba(15, 23, 42, 0.76));
      box-shadow: 0 12px 32px rgba(2, 6, 23, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .brand-mark {
      background: linear-gradient(145deg, rgba(251, 113, 133, 0.24), rgba(167, 139, 250, 0.12));
      box-shadow: 0 8px 28px rgba(251, 113, 133, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .screen,
    .setup-hero > *,
    .library-header > *,
    .reveal-heading > * {
      min-width: 0;
    }

    h1 {
      text-wrap: balance;
      text-shadow: 0 12px 38px rgba(2, 6, 23, 0.38);
    }

    h2,
    .prompt,
    .card-question {
      text-wrap: pretty;
    }

    .accent-text {
      color: transparent;
      background: linear-gradient(110deg, #fda4af 4%, var(--coral) 42%, #c4b5fd 95%);
      background-clip: text;
      -webkit-background-clip: text;
      filter: drop-shadow(0 8px 22px rgba(251, 113, 133, 0.18));
    }

    .love-orbit::before,
    .love-orbit::after {
      position: absolute;
      border-radius: 50%;
      content: "";
      pointer-events: none;
    }

    .love-orbit::before {
      inset: 1px;
      background: radial-gradient(circle, rgba(251, 113, 133, 0.08), transparent 66%);
      filter: blur(3px);
    }

    .love-orbit::after {
      top: 24%;
      right: 12%;
      width: 4px;
      height: 4px;
      background: #fff;
      box-shadow: -122px 53px 0 var(--coral), -36px 116px 0 var(--blue), -78px -24px 0 var(--sun);
      animation: twinkle 2.8s ease-in-out infinite alternate;
    }

    .setup-card,
    .question-card,
    .lock-card,
    .alignment-dashboard,
    .home-results,
    .library-add {
      border-color: rgba(226, 232, 240, 0.13);
      box-shadow: var(--soft-glow), inset 0 1px 0 rgba(255, 255, 255, 0.045);
      backdrop-filter: blur(22px) saturate(1.2);
      -webkit-backdrop-filter: blur(22px) saturate(1.2);
    }

    .setup-card,
    .question-card,
    .lock-card {
      position: relative;
    }

    .setup-card::before,
    .question-card::before,
    .lock-card::before {
      position: absolute;
      top: 0;
      right: 12%;
      left: 12%;
      height: 1px;
      content: "";
      pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.28), transparent);
    }

    .setup-card {
      border-radius: 30px;
      background:
        radial-gradient(circle at 92% 4%, rgba(167, 139, 250, 0.13), transparent 17rem),
        radial-gradient(circle at 0 100%, rgba(96, 165, 250, 0.08), transparent 18rem),
        linear-gradient(145deg, rgba(39, 52, 73, 0.95), rgba(24, 35, 53, 0.92));
    }

    .name-input,
    .answer-textarea,
    .comment-textarea,
    .custom-input,
    .custom-select,
    .library-search {
      border-color: rgba(226, 232, 240, 0.16);
      background: linear-gradient(145deg, rgba(8, 17, 31, 0.72), rgba(15, 23, 42, 0.78));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.025);
    }

    .name-input:hover,
    .answer-textarea:hover,
    .comment-textarea:hover,
    .custom-input:hover,
    .custom-select:hover,
    .library-search:hover {
      border-color: rgba(251, 113, 133, 0.34);
    }

    .count-card,
    .mode-card,
    .topic-chip,
    .sound-setting,
    .library-launcher,
    .data-tool {
      border-color: rgba(226, 232, 240, 0.12);
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.62), rgba(8, 17, 31, 0.44));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
    }

    .count-card,
    .mode-card,
    .topic-chip,
    .sound-setting,
    .library-launcher,
    .data-tool,
    .library-filter,
    .question-library-action {
      transition: transform 180ms var(--ease-out), border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .count-option input:checked + .count-card,
    .mode-option input:checked + .mode-card {
      border-color: rgba(251, 113, 133, 0.74);
      background:
        radial-gradient(circle at 90% 10%, rgba(167, 139, 250, 0.15), transparent 8rem),
        linear-gradient(145deg, rgba(251, 113, 133, 0.18), rgba(15, 23, 42, 0.72));
      box-shadow: 0 0 0 3px rgba(251, 113, 133, 0.08), 0 14px 30px rgba(2, 6, 23, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .topic-option input:checked + .topic-chip {
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--topic-color) 8%, transparent), 0 10px 25px color-mix(in srgb, var(--topic-color) 9%, transparent);
    }

    .mini-action,
    .library-filter,
    .question-library-action {
      min-height: 42px;
      border-radius: 12px;
    }

    .primary-btn {
      min-height: 54px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: #310b14;
      background: linear-gradient(135deg, #fda4af, var(--coral) 58%, #f472b6);
      box-shadow: 0 14px 34px rgba(251, 113, 133, 0.27), inset 0 1px 0 rgba(255, 255, 255, 0.35);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .secondary-btn,
    .home-btn {
      transition: transform 180ms var(--ease-out), border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .primary-btn:active,
    .secondary-btn:active,
    .home-btn:active,
    .data-tool:active,
    .library-launcher:active,
    .mini-action:active,
    .question-library-action:active {
      transform: scale(0.975);
    }

    .question-card {
      border-radius: 30px;
      background:
        radial-gradient(circle at 100% 0, rgba(251, 113, 133, 0.17), transparent 18rem),
        radial-gradient(circle at 0 100%, rgba(96, 165, 250, 0.08), transparent 16rem),
        linear-gradient(145deg, rgba(39, 52, 73, 0.97), rgba(24, 35, 53, 0.94));
    }

    .progress-track {
      height: 8px;
      border: 1px solid rgba(226, 232, 240, 0.07);
      background: rgba(8, 17, 31, 0.62);
      box-shadow: inset 0 2px 5px rgba(2, 6, 23, 0.34);
    }

    .progress-bar {
      background: linear-gradient(90deg, var(--coral-dark), var(--coral), #c4b5fd);
      box-shadow: 0 0 18px rgba(251, 113, 133, 0.35);
    }

    .slider-panel,
    .comment-details,
    .comparison-wrap {
      border-color: rgba(226, 232, 240, 0.12);
      background: linear-gradient(145deg, rgba(8, 17, 31, 0.56), rgba(15, 23, 42, 0.48));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
    }

    .slider-panel {
      padding: 24px 20px 20px;
      border-radius: 20px;
    }

    .range-input {
      height: 46px;
    }

    .range-input::-webkit-slider-runnable-track {
      height: 10px;
      box-shadow: inset 0 2px 4px rgba(2, 6, 23, 0.35);
    }

    .range-input::-moz-range-track,
    .range-input::-moz-range-progress {
      height: 10px;
    }

    .range-input::-webkit-slider-thumb {
      width: 32px;
      height: 32px;
      margin-top: -11px;
      border-width: 5px;
      box-shadow: 0 5px 18px rgba(2, 6, 23, 0.58), 0 0 0 5px rgba(251, 113, 133, 0.1);
    }

    .range-input::-moz-range-thumb {
      width: 23px;
      height: 23px;
      border-width: 5px;
      box-shadow: 0 5px 18px rgba(2, 6, 23, 0.58), 0 0 0 5px rgba(251, 113, 133, 0.1);
    }

    .card-face,
    .library-question,
    .topic-progress-card,
    .home-topic-result,
    .topic-alignment-card {
      box-shadow: 0 16px 42px rgba(2, 6, 23, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.035);
    }

    .flip-card-inner {
      transition-duration: 680ms;
      transition-timing-function: var(--ease-out);
    }

    .card-face {
      border-color: rgba(226, 232, 240, 0.14);
      border-radius: 22px;
    }

    .library-question {
      border-radius: 18px;
      background:
        radial-gradient(circle at 100% 0, rgba(167, 139, 250, 0.055), transparent 10rem),
        linear-gradient(145deg, rgba(30, 41, 59, 0.84), rgba(15, 23, 42, 0.67));
    }

    .question-library-list {
      max-height: min(68vh, 720px);
      max-height: min(68dvh, 720px);
      padding-right: 7px;
      scroll-padding: 12px;
    }

    .modal-backdrop {
      padding:
        max(18px, env(safe-area-inset-top))
        max(18px, env(safe-area-inset-right))
        max(18px, env(safe-area-inset-bottom))
        max(18px, env(safe-area-inset-left));
      background: rgba(2, 6, 23, 0.78);
      backdrop-filter: blur(16px) saturate(1.2);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
    }

    .exit-dialog {
      max-height: calc(100dvh - 36px);
      overflow-y: auto;
    }

    @media (hover: hover) and (pointer: fine) {
      .count-option:hover .count-card,
      .mode-option:hover .mode-card,
      .topic-option:hover .topic-chip,
      .library-launcher:hover,
      .data-tool:hover,
      .topic-progress-card:hover,
      .library-question:hover {
        transform: translateY(-3px);
      }

      .card-face:hover {
        border-color: rgba(251, 113, 133, 0.28);
        box-shadow: 0 21px 52px rgba(2, 6, 23, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }
    }

    @media (pointer: coarse) {
      button,
      .mini-action,
      .library-filter,
      .question-library-action,
      .topic-chip,
      summary {
        min-height: 48px;
      }

      .range-input {
        height: 54px;
      }

      .flip-card {
        min-height: 224px;
      }

      .card-front,
      .card-face {
        min-height: 224px;
      }
    }

    @media (max-width: 600px) {
      body {
        background-attachment: scroll;
      }

      .app-shell {
        width: min(calc(100% - 20px), 980px);
        padding-top: max(12px, env(safe-area-inset-top));
      }

      .topbar {
        top: max(5px, env(safe-area-inset-top));
        margin-bottom: 22px;
      }

      h1 {
        font-size: clamp(2.35rem, 13vw, 3.85rem);
        line-height: 1.02;
      }

      .lede {
        margin-top: 16px;
        font-size: 0.98rem;
        line-height: 1.6;
      }

      .setup-card,
      .question-card {
        padding: 20px;
        border-radius: 24px;
      }

      .setup-card {
        margin-top: 24px;
      }

      .setup-start-actions {
        position: sticky;
        z-index: 30;
        bottom: calc(74px + env(safe-area-inset-bottom));
        margin: 20px -10px 0;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 19px;
        background: rgba(15, 23, 42, 0.88);
        box-shadow: 0 16px 40px rgba(2, 6, 23, 0.36);
        backdrop-filter: blur(18px) saturate(1.2);
        -webkit-backdrop-filter: blur(18px) saturate(1.2);
      }

      .count-card {
        min-height: 78px;
        padding: 10px 7px;
        flex-direction: column;
        gap: 3px;
        text-align: center;
      }

      .count-time {
        font-size: 0.62rem;
      }

      .name-input,
      .answer-textarea,
      .comment-textarea,
      .custom-input,
      .custom-select,
      .library-search {
        font-size: 16px;
      }

      .topic-picker {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .topic-option,
      .topic-chip {
        width: 100%;
      }

      .topic-chip {
        min-height: 48px;
      }

      .sound-setting {
        min-height: 64px;
      }

      .slider-panel {
        margin-top: 19px;
        padding: 19px 14px 14px;
      }

      .range-labels {
        gap: 12px;
        font-size: 0.72rem;
      }

      .question-library-list {
        max-height: 64vh;
        max-height: 64dvh;
      }

      .library-question {
        padding: 13px;
      }

      .home-topic-results {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 420px) {
      .topic-toolbar {
        display: grid;
        width: 100%;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .mini-action {
        width: 100%;
      }

      .home-results {
        padding: 18px;
      }

      .home-topic-results {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .saved-answer-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 350px) {
      .app-shell {
        width: min(calc(100% - 14px), 980px);
      }

      .setup-card,
      .question-card,
